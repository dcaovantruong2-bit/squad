# Squad — Phase-Specific Synergy Cards (Stats-Based, 2+ Players)
# Each synergy fires when the trigger conditions are met on the current field.
# Effects apply to the players involved (add_chips, multiply) or globally.
#
# trigger_type maps to a checker function in src/scoring.py
# trigger dict holds the specific parameters for that checker

# ── Goal Kick (GK + CB + CB) ──────────────────────────────────────────────

[[synergies]]
id = "clean_sheet"
name = "Clean Sheet"
rarity = "common"
trigger_type = "clean_sheet"
trigger = { pos_a = "GK", pos_b = "CB", stat = "def_", threshold = 18 }
effect_type = "add_chips"
effect = { add_chips = 20 }
description = "GK DEF + CB DEF ≥ 18: +20 chips to both"

[[synergies]]
id = "organised_defence"
name = "Organised Defence"
rarity = "common"
trigger_type = "organised_defence"
trigger = { positions = ["CB", "CB"], stat = "def_", threshold = 18 }
effect_type = "add_chips"
effect = { add_chips = 20 }
description = "CB DEF + CB DEF ≥ 18: +20 chips to both CBs"

