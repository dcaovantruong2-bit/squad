<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Formation Select</title>
  <link rel="stylesheet" href="../game.css">
  <script src="../game-engine.js"></script>
</head>
<body>
  <div class="screen">
<section class="game-screen" id="screen-formation" data-od-id="formation-select-screen">
    <div class="form-header">
      <h1 class="form-title" data-od-id="formation-title">Choose Formation</h1>
      <p class="form-subtitle" data-od-id="formation-subtitle">Your shape determines position bonuses and trade-offs.</p>
    </div>
    <div class="formations-grid" id="formations-grid" data-od-id="formations-grid"></div>
    <div class="squad-actions">
      <button class="btn" onclick="showScreen('squad')">◂ Back</button>
      <button class="btn btn-primary btn-lg" id="confirm-formation-btn" disabled>Start Match ▸</button>
    </div>
  </section>
  </div>
</body>
</html>
