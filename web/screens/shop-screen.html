<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squad — Shop</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: #0a0812;
      color: #f0ecf8;
      font-family: 'VT323', monospace;
      font-size: 16px;
      line-height: 1.4;
      overflow-x: hidden;
    }

    /* ── CRT Scanlines Overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
      );
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0812; }
    ::-webkit-scrollbar-thumb { background: #3d2d5c; border-radius: 0; }

    /* ── Layout ── */
    .shop-container {
      max-width: 960px; margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ── Header ── */
    .shop-header {
      text-align: center; margin-bottom: 20px;
    }
    .shop-title {
      font-family: 'Press Start 2P', monospace;
      font-size: 24px; color: #39ff14;
      text-shadow: 0 0 12px rgba(57,255,20,0.6), 0 0 24px rgba(57,255,20,0.3);
      letter-spacing: 4px;
    }
    .shop-context {
      font-family: 'VT323', monospace; font-size: 16px;
      color: #9a8ab0; margin-top: 6px; letter-spacing: 1px;
    }

    /* ── Morale Section ── */
    .morale-section {
      display: flex; flex-wrap: wrap; align-items: center;
      gap: 12px 20px; padding: 16px 20px;
      background: #110d1f; border: 1px solid #2e2250;
      margin-bottom: 20px;
    }
    .morale-label {
      font-family: 'Press Start 2P', monospace; font-size: 10px;
      color: #c8b8e0; min-width: 80px;
    }
    .morale-value {
      font-family: 'Press Start 2P', monospace; font-size: 28px;
      color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.5);
      min-width: 50px; text-align: center;
      transition: all 0.15s ease;
    }
    .morale-value.flash {
      color: #fff; text-shadow: 0 0 18px rgba(255,215,0,0.9);
    }
    .morale-bar-track {
      flex: 1; min-width: 150px; height: 20px;
      background: #0a0812; border: 1px solid #2e2250;
      position: relative;
    }
    .morale-bar-fill {
      height: 100%; background: linear-gradient(90deg, #ffd700, #ffaa00);
      transition: width 0.3s ease; width: 50%;
    }
    .morale-bar-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      color: #0a0812;
    }
    .morale-max {
      font-family: 'VT323', monospace; font-size: 14px;
      color: #9a8ab0; margin-left: 4px;
    }

    /* ── Two-Column Layout ── */
    .shop-body {
      display: flex; gap: 20px; flex-wrap: wrap;
    }
    .shop-body-left {
      flex: 0 0 340px; min-width: 280px;
    }
    .shop-body-right {
      flex: 1; min-width: 300px;
    }

    /* ── Panel Headers ── */
    .panel-header {
      font-family: 'Press Start 2P', monospace; font-size: 10px;
      color: #39ff14; padding: 10px 14px;
      background: #1a1530; border: 1px solid #2e2250;
      display: flex; align-items: center; gap: 8px;
    }
    .panel-header .icon { font-size: 16px; }

    /* ── Squad Status Panel ── */
    .squad-panel { border: 1px solid #2e2250; background: #110d1f; margin-bottom: 20px; }
    .squad-list { max-height: 420px; overflow-y: auto; }
    .squad-player {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 12px; border-bottom: 1px solid #1a1530;
      font-size: 15px; transition: background 0.15s;
    }
    .squad-player:last-child { border-bottom: none; }
    .squad-player .player-name {
      color: #f0ecf8; min-width: 90px; flex-shrink: 0;
      font-family: 'VT323', monospace; font-size: 16px;
    }
    .squad-player .player-pos {
      color: #9a8ab0; font-size: 12px; min-width: 28px; flex-shrink: 0;
    }
    .squad-player .fatigue-track {
      flex: 1; height: 12px; background: #0a0812;
      border: 1px solid #1a1530; min-width: 60px;
    }
    .squad-player .fatigue-fill {
      height: 100%; transition: width 0.4s ease;
    }
    .squad-player .fatigue-pct {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      color: #c8b8e0; min-width: 32px; text-align: right;
    }
    /* Fatigue colors */
    .fat-low .fatigue-fill { background: #39ff14; }
    .fat-med .fatigue-fill { background: #ffd700; }
    .fat-high .fatigue-fill { background: #ffa500; }
    .fat-crit .fatigue-fill { background: #ff3344; box-shadow: 0 0 8px rgba(255,51,68,0.6); }
    .fat-crit { background: rgba(255,51,68,0.06); }
    .squad-player.tired { background: rgba(255,51,68,0.05); }

    /* ── Shop Items Grid ── */
    .shop-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-top: 0;
    }
    .shop-item {
      background: #110d1f; border: 1px solid #2e2250;
      padding: 16px 14px; position: relative;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .shop-item:hover { border-color: #4d3d6c; background: #1a1530; transform: translateY(-2px); }
    .shop-item.purchased {
      opacity: 0.5; border-color: #2e2250; pointer-events: none;
    }
    .shop-item.purchased::after {
      content: '✓'; position: absolute; top: 8px; right: 10px;
      font-family: 'Press Start 2P', monospace; font-size: 14px;
      color: #39ff14; text-shadow: 0 0 8px rgba(57,255,20,0.6);
    }
    .shop-item .item-icon {
      font-size: 24px; margin-bottom: 6px;
    }
    .shop-item .item-name {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      color: #f0ecf8; margin-bottom: 6px; line-height: 1.4;
    }
    .shop-item .item-desc {
      font-size: 14px; color: #c8b8e0; margin-bottom: 10px; line-height: 1.3;
    }
    .shop-item .item-footer {
      display: flex; align-items: center; justify-content: space-between;
    }
    .item-cost-badge {
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      padding: 3px 10px; color: #ffd700;
      background: #1a1530; border: 1px solid #2e2250;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-buy {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      padding: 5px 14px; border: 1px solid #39ff14;
      background: transparent; color: #39ff14;
      cursor: pointer; transition: all 0.12s; text-transform: uppercase;
    }
    .btn-buy:hover:not(:disabled) {
      background: #39ff14; color: #0a0812;
      box-shadow: 0 0 12px rgba(57,255,20,0.4);
    }
    .btn-buy:disabled {
      border-color: #3d2d5c; color: #3d2d5c;
      cursor: not-allowed; opacity: 0.5;
    }

    /* ── Rarity Borders ── */
    .shop-item.rarity-common { border-left: 3px solid #3d2d5c; }
    .shop-item.rarity-uncommon { border-left: 3px solid #00ccff; }
    .shop-item.rarity-rare { border-left: 3px solid #ffd700; }

    /* ── Active Buffs Strip ── */
    .buffs-strip {
      border: 1px solid #2e2250; background: #110d1f;
      padding: 12px 14px; margin-top: 14px;
      min-height: 50px; display: flex; flex-wrap: wrap;
      align-items: center; gap: 8px;
    }
    .buffs-strip .label {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      color: #c8b8e0; margin-right: 4px;
    }
    .buff-tag {
      font-family: 'Press Start 2P', monospace; font-size: 8px;
      padding: 4px 10px; background: #1a1530;
      border: 1px solid #39ff14; color: #39ff14;
      animation: buffPulse 2s ease-in-out infinite;
    }
    @keyframes buffPulse {
      0%, 100% { box-shadow: 0 0 3px rgba(57,255,20,0.2); }
      50% { box-shadow: 0 0 10px rgba(57,255,20,0.5); }
    }
    .buffs-empty { font-size: 14px; color: #9a8ab0; font-style: italic; }

    /* ── Feedback Toast ── */
    .shop-toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 10000; padding: 10px 24px;
      font-family: 'Press Start 2P', monospace; font-size: 9px;
      border: 1px solid; background: #0a0812;
      animation: toastIn 0.25s ease-out, toastOut 0.3s 1.8s ease-out forwards;
    }
    .shop-toast.success { color: #39ff14; border-color: #39ff14; }
    .shop-toast.error { color: #ff3344; border-color: #ff3344; }
    @keyframes toastIn {
      0% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
      100% { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes toastOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* ── Actions Row ── */
    .shop-actions {
      display: flex; gap: 14px; justify-content: center;
      margin-top: 24px; flex-wrap: wrap;
    }
    .btn-action {
      font-family: 'Press Start 2P', monospace; font-size: 11px;
      padding: 12px 32px; border: 2px solid; cursor: pointer;
      transition: all 0.12s; text-transform: uppercase; letter-spacing: 1px;
    }
    .btn-skip {
      background: transparent; border-color: #9a8ab0; color: #9a8ab0;
    }
    .btn-skip:hover { background: #9a8ab0; color: #0a0812; }
    .btn-continue {
      background: transparent; border-color: #39ff14; color: #39ff14;
      font-size: 12px; padding: 14px 40px;
    }
    .btn-continue:hover {
      background: #39ff14; color: #0a0812;
      box-shadow: 0 0 20px rgba(57,255,20,0.5);
    }

    /* ── Responsive ── */
    @media (max-width: 720px) {
      .shop-body-left { flex: 1 1 100%; }
      .shop-body-right { flex: 1 1 100%; }
      .shop-grid { grid-template-columns: 1fr; }
      .shop-title { font-size: 18px; }
      .squad-list { max-height: 260px; }
    }
    @media (max-width: 480px) {
      .shop-container { padding: 16px 12px 32px; }
      .btn-action { width: 100%; font-size: 10px; padding: 10px 20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition-duration: 0s !important; animation-duration: 0s !important; }
    }
  </style>
</head>
<body>

<div class="shop-container">
  <!-- ═══ HEADER ═══ -->
  <header class="shop-header">
    <div class="shop-title">💰 SHOP</div>
    <div class="shop-context" id="shopContext">Spend your morale before the next round</div>
  </header>

  <!-- ═══ MORALE ═══ -->
  <div class="morale-section">
    <span class="morale-label">MORALE</span>
    <span class="morale-value" id="moraleDisplay">5</span>
    <div class="morale-bar-track">
      <div class="morale-bar-fill" id="moraleBarFill" style="width:50%"></div>
      <div class="morale-bar-text"><span id="moraleBarPct">5</span>/<span id="moraleBarMax">12</span></div>
    </div>
  </div>

  <!-- ═══ BODY ═══ -->
  <div class="shop-body">
    <!-- LEFT: Squad Panel -->
    <div class="shop-body-left">
      <div class="squad-panel">
        <div class="panel-header"><span class="icon">👥</span> SQUAD STATUS</div>
        <div class="squad-list" id="squadList"></div>
      </div>
    </div>

    <!-- RIGHT: Shop Items -->
    <div class="shop-body-right">
      <div class="panel-header"><span class="icon">🛒</span> AVAILABLE ITEMS</div>
      <div class="shop-grid" id="shopGrid"></div>

      <!-- Active Buffs -->
      <div class="buffs-strip" id="buffsStrip">
        <span class="label">ACTIVE BUFFS</span>
        <span class="buffs-empty">None yet — buy something above</span>
      </div>
    </div>
  </div>

  <!-- ═══ ACTIONS ═══ -->
  <div class="shop-actions">
    <button class="btn-action btn-skip" id="btnSkip">↺ SKIP SHOP</button>
    <button class="btn-action btn-continue" id="btnContinue">▶ CONTINUE</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ================================================================
     STATE — read from engine G / window.SHOP_ITEMS, with fallbacks
     ================================================================ */

  var morale = 0;
  var MAX_MORALE = 12;
  var squadPlayers = [];   // [{name, pos, fatiguePct, id}]
  var shopItemsData = [];  // [{id, name, icon, desc, cost, rarity, purchased}]

  // ── Detect engine presence ──
  var engineAvailable = (typeof G !== 'undefined' && G.selectedIds && G.selectedIds.length > 0);

  /* ================================================================
     SHOP ITEM DEFINITIONS — from engine SHOP_ITEMS, with fallback
     ================================================================ */

  var RARITY_MAP = {
    'energy_drink': 'common',
    'tactical_upgrade': 'common',
    'super_sub': 'common',
    'tactical_shift': 'uncommon',
    'set_piece_drill': 'uncommon',
    'morale_boost': 'common',
    'formation_tweak': 'rare',
    'momentum_injector': 'uncommon',
    'scout_report': 'common',
    'double_session': 'uncommon'
  };
  var ICON_MAP = {
    'energy_drink': '⚡',
    'tactical_upgrade': '🛠️',
    'super_sub': '🔁',
    'tactical_shift': '🧠',
    'set_piece_drill': '🎯',
    'morale_boost': '💪',
    'formation_tweak': '📐',
    'momentum_injector': '💥',
    'scout_report': '📋',
    'double_session': '🏃'
  };

  function buildEngineShopItems() {
    if (window.SHOP_ITEMS) {
      var items = [];
      var keys = Object.keys(window.SHOP_ITEMS);
      for (var i = 0; i < keys.length; i++) {
        var key = keys[i];
        var si = window.SHOP_ITEMS[key];
        var purchased = !!(G.shopBuffs && G.shopBuffs.some(function(b) { return b.id === key; }));
        items.push({
          id: key,
          name: si.name,
          icon: ICON_MAP[key] || '📦',
          desc: si.desc,
          cost: si.cost,
          rarity: RARITY_MAP[key] || 'common',
          effect: si.effect,
          purchased: purchased
        });
      }
      return items;
    }
    return [];
  }

  function buildFallbackShopItems() {
    return [
      { id:'energy_drink',      name:'Energy Drink',      icon:'⚡', desc:'Restore one player to full fatigue',      cost:2, rarity:'common',   effect:{type:'fullReset',value:1} },
      { id:'tactical_upgrade',  name:'Tactical Upgrade',  icon:'🛠️', desc:'+1 to a chosen stat on one player',      cost:3, rarity:'common',   effect:{type:'placeholder',value:1} },
      { id:'set_piece_drill',   name:'Set Piece Drill',   icon:'🎯', desc:'Next round: all phases get +40 chips',   cost:4, rarity:'uncommon', effect:{type:'chipsBuff',value:40} },
      { id:'super_sub',         name:'Super Sub',         icon:'🔁', desc:'Fresh player gets ×1.3 this round',      cost:2, rarity:'common',   effect:{type:'superSub',value:1.3} },
      { id:'tactical_shift',    name:'Tactical Shift',    icon:'🧠', desc:'Next round: +5 add_mult on all phases',  cost:5, rarity:'uncommon', effect:{type:'addMultBuff',value:5} },
      { id:'formation_tweak',   name:'Formation Tweak',   icon:'📐', desc:'+0.05 formation mult for next match',   cost:3, rarity:'rare',     effect:{type:'formMult',value:0.05} },
      { id:'momentum_injector', name:'Momentum Injector', icon:'💥', desc:'Next phase starts at ×1.5 momentum',    cost:4, rarity:'uncommon', effect:{type:'momentumBoost',value:1.5} },
      { id:'scout_report',      name:'Scout Report',      icon:'📋', desc:'See all 8 phases this round',            cost:2, rarity:'common',   effect:{type:'scout',value:1} },
      { id:'double_session',    name:'Double Session',    icon:'🏃', desc:'Fatigue penalty reduced to ×0.8',        cost:4, rarity:'uncommon', effect:{type:'fatiguePenalty',value:0.8} },
      { id:'morale_boost',      name:'Morale Boost',      icon:'💪', desc:'+5 morale',                              cost:1, rarity:'common',   effect:{type:'morale',value:5} }
    ];
  }

  /* ================================================================
     SQUAD PLAYERS — from engine G.fatigue, with fallback
     ================================================================ */

  function buildEngineSquad() {
    var squad = [];
    if (typeof getSquad === 'function') {
      var engineSquad = getSquad();
      for (var i = 0; i < engineSquad.length; i++) {
        var ep = engineSquad[i];
        var fatigueVal = G.fatigue[ep.id];
        if (fatigueVal === undefined) fatigueVal = 1.0;
        // G.fatigue: 1.0 = fresh, 0.3 = exhausted
        // Display as fatigue %: (1.0 - fatigue) * 100
        var fatiguePct = Math.round((1.0 - fatigueVal) * 100);
        squad.push({
          name: ep.name,
          pos: ep.position,
          fatiguePct: fatiguePct,
          fatigueVal: fatigueVal,
          id: ep.id
        });
      }
    }
    return squad;
  }

  function buildFallbackSquad() {
    return [
      { name:'Gigi Wall',     pos:'GK', fatiguePct:12, fatigueVal:0.88 },
      { name:'El Capitán',    pos:'CB', fatiguePct:25, fatigueVal:0.75 },
      { name:'JT Rock',       pos:'CB', fatiguePct:35, fatigueVal:0.65 },
      { name:'El Tren',       pos:'FB', fatiguePct:18, fatigueVal:0.82 },
      { name:'Mr Reliable',   pos:'FB', fatiguePct:45, fatigueVal:0.55 },
      { name:'The Wall',      pos:'CDM',fatiguePct:50, fatigueVal:0.50 },
      { name:'Captain Stevie',pos:'CM', fatiguePct:60, fatigueVal:0.40 },
      { name:'Maestro Xav',   pos:'CM', fatiguePct:8,  fatigueVal:0.92 },
      { name:'El Mago',       pos:'CAM',fatiguePct:30, fatigueVal:0.70 },
      { name:'Rob Cutter',    pos:'RW', fatiguePct:70, fatigueVal:0.30 },
      { name:'Terry Henri',   pos:'ST', fatiguePct:85, fatigueVal:0.15 },
      { name:'Bale Out',      pos:'LW', fatiguePct:42, fatigueVal:0.58 }
    ];
  }

  /* ================================================================
     DOM REFS
     ================================================================ */

  var moraleDisplay   = document.getElementById('moraleDisplay');
  var moraleBarFill   = document.getElementById('moraleBarFill');
  var moraleBarPct    = document.getElementById('moraleBarPct');
  var moraleBarMax    = document.getElementById('moraleBarMax');
  var squadList       = document.getElementById('squadList');
  var shopGrid        = document.getElementById('shopGrid');
  var buffsStrip      = document.getElementById('buffsStrip');
  var btnSkip         = document.getElementById('btnSkip');
  var btnContinue     = document.getElementById('btnContinue');
  var shopContext     = document.getElementById('shopContext');

  /* ================================================================
     HELPER: Fatigue class
     ================================================================ */

  function fatigueClass(pct) {
    if (pct >= 75) return 'fat-crit';
    if (pct >= 55) return 'fat-high';
    if (pct >= 30) return 'fat-med';
    return 'fat-low';
  }

  function fatigueColor(pct) {
    if (pct >= 75) return '#ff3344';
    if (pct >= 55) return '#ffa500';
    if (pct >= 30) return '#ffd700';
    return '#39ff14';
  }

  /* ================================================================
     TOAST
     ================================================================ */

  function showToast(msg, type) {
    type = type || 'success';
    var existing = document.querySelector('.shop-toast');
    if (existing) existing.remove();
    var toast = document.createElement('div');
    toast.className = 'shop-toast ' + type;
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() { toast.remove(); }, 2200);
  }

  /* ================================================================
     RENDER: Squad List
     ================================================================ */

  function renderSquad() {
    squadList.innerHTML = '';
    for (var i = 0; i < squadPlayers.length; i++) {
      var p = squadPlayers[i];
      var fc = fatigueClass(p.fatiguePct);
      var color = fatigueColor(p.fatiguePct);
      var isTired = p.fatiguePct >= 55;

      var div = document.createElement('div');
      div.className = 'squad-player ' + fc + (isTired ? ' tired' : '');

      div.innerHTML =
        '<span class="player-name">' + escHtml(p.name) + '</span>' +
        '<span class="player-pos">' + escHtml(p.pos) + '</span>' +
        '<div class="fatigue-track">' +
          '<div class="fatigue-fill" style="width:' + p.fatiguePct + '%;background:' + color + (p.fatiguePct >= 75 ? ';box-shadow:0 0 8px rgba(255,51,68,0.6)' : '') + '"></div>' +
        '</div>' +
        '<span class="fatigue-pct" style="color:' + color + '">' + p.fatiguePct + '%</span>';

      squadList.appendChild(div);
    }
  }

  /* ================================================================
     RENDER: Morale
     ================================================================ */

  function updateMorale(animate) {
    var pct = Math.min(100, Math.round((morale / MAX_MORALE) * 100));
    moraleDisplay.textContent = morale;
    moraleBarFill.style.width = pct + '%';
    moraleBarPct.textContent = morale;
    moraleBarMax.textContent = MAX_MORALE;

    if (animate) {
      moraleDisplay.classList.add('flash');
      setTimeout(function() { moraleDisplay.classList.remove('flash'); }, 300);
    }

    // Update buy button states
    var btns = document.querySelectorAll('.btn-buy');
    for (var i = 0; i < btns.length; i++) {
      var cost = parseInt(btns[i].dataset.cost, 10);
      btns[i].disabled = (cost > morale);
    }
  }

  /* ================================================================
     RENDER: Shop Grid
     ================================================================ */

  function renderShop() {
    shopGrid.innerHTML = '';
    for (var i = 0; i < shopItemsData.length; i++) {
      var item = shopItemsData[i];
      var card = document.createElement('div');
      card.className = 'shop-item rarity-' + item.rarity;
      if (item.purchased) card.classList.add('purchased');

      var canBuy = !item.purchased && morale >= item.cost;

      card.innerHTML =
        '<div class="item-icon">' + escHtml(item.icon) + '</div>' +
        '<div class="item-name">' + escHtml(item.name) + '</div>' +
        '<div class="item-desc">' + escHtml(item.desc) + '</div>' +
        '<div class="item-footer">' +
          '<span class="item-cost-badge">💰 ' + item.cost + '</span>' +
          (item.purchased
            ? '<button class="btn-buy" disabled>✓ OWNED</button>'
            : '<button class="btn-buy" data-id="' + escHtml(item.id) + '" data-cost="' + item.cost + '"' + (canBuy ? '' : ' disabled') + '>BUY</button>') +
        '</div>';

      // Attach buy click
      var buyBtn = card.querySelector('.btn-buy');
      if (buyBtn && !item.purchased) {
        buyBtn.addEventListener('click', function(e) {
          e.stopPropagation();
          buyItem(this.dataset.id);
        });
      }

      shopGrid.appendChild(card);
    }
  }

  /* ================================================================
     RENDER: Active Buffs
     ================================================================ */

  function renderBuffs() {
    buffsStrip.innerHTML = '<span class="label">ACTIVE BUFFS</span>';

    var active = [];
    if (engineAvailable && G.shopBuffs && G.shopBuffs.length > 0) {
      for (var i = 0; i < G.shopBuffs.length; i++) {
        active.push(G.shopBuffs[i]);
      }
    } else {
      // Fallback: from shopItemsData
      for (var i = 0; i < shopItemsData.length; i++) {
        if (shopItemsData[i].purchased) {
          active.push({ name: shopItemsData[i].name, icon: shopItemsData[i].icon });
        }
      }
    }

    if (active.length === 0) {
      buffsStrip.innerHTML += '<span class="buffs-empty">None yet — buy something above</span>';
      return;
    }

    for (var i = 0; i < active.length; i++) {
      var tag = document.createElement('span');
      tag.className = 'buff-tag';
      tag.textContent = (active[i].icon || '📦') + ' ' + active[i].name;
      buffsStrip.appendChild(tag);
    }
  }

  /* ================================================================
     BUY ITEM
     ================================================================ */

  function buyItem(itemId) {
    // Try engine first
    if (engineAvailable && typeof buyShopItem === 'function') {
      var success = buyShopItem(itemId);
      if (success) {
        morale = G.morale;
        // Mark purchased locally
        var item = shopItemsData.find(function(it) { return it.id === itemId; });
        if (item) item.purchased = true;
        updateMorale(true);
        renderShop();
        renderBuffs();
        showToast('✓ Purchased!', 'success');
        return;
      } else {
        showToast('✗ Cannot purchase — not enough morale?', 'error');
        return;
      }
    }

    // Fallback: local purchase logic
    var item = shopItemsData.find(function(it) { return it.id === itemId; });
    if (!item || item.purchased) return;
    if (morale < item.cost) {
      showToast('✗ Not enough morale!', 'error');
      return;
    }

    morale -= item.cost;
    item.purchased = true;
    updateMorale(true);
    renderShop();
    renderBuffs();
    showToast('✓ Purchased ' + item.name + '!', 'success');
  }

  /* ================================================================
     CONTINUE — Navigate based on game state
     ================================================================ */

  function continueGame() {
    if (engineAvailable) {
      // CONTINUE: go to phase select for next round
      if (typeof startRound === 'function') startRound();
      if (typeof saveGame === 'function') saveGame();
      if (window.Game) {
        window.Game.transition = 'slide-left';
        window.Game.navigate('phases');
      }
      return;
    }

    // Fallback: go to phases screen
    if (window.Game && typeof window.Game.navigate === 'function') {
      window.Game.transition = 'slide-left';
      window.Game.navigate('phases');
    } else {
      console.log('[Shop] Continue — no Game.navigate available');
    }
  }

  function skipShop() {
    if (engineAvailable) {
      if (typeof startRound === 'function') startRound();
      if (typeof saveGame === 'function') saveGame();
      if (window.Game) {
        window.Game.transition = 'slide-left';
        window.Game.navigate('phases');
      }
      return;
    }

    // Fallback
    if (window.Game && typeof window.Game.navigate === 'function') {
      window.Game.transition = 'slide-left';
      window.Game.navigate('phases');
    } else {
      console.log('[Shop] Skipped — no Game.navigate available');
    }
  }

  /* ================================================================
     HTML ESCAPE
     ================================================================ */

  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ================================================================
     UPDATE SHOP CONTEXT (match info)
     ================================================================ */

  function updateContext() {
    if (engineAvailable && window.CAMPAIGN_MATCHES && G.matchIdx < window.CAMPAIGN_MATCHES.length) {
      var match = window.CAMPAIGN_MATCHES[G.matchIdx];
      shopContext.textContent = match.name + ' · ' + match.opponent + ' · Round ' + (G.roundIdx + 1) + '/3';
    }
  }

  /* ================================================================
     INIT
     ================================================================ */

  function init() {
    // ── Build data ──
    if (engineAvailable) {
      morale = G.morale || 5;
      squadPlayers = buildEngineSquad();
      shopItemsData = buildEngineShopItems();
      if (shopItemsData.length === 0) shopItemsData = buildFallbackShopItems();
    } else {
      morale = 5;
      squadPlayers = buildFallbackSquad();
      shopItemsData = buildFallbackShopItems();
    }

    // ── Render ──
    renderSquad();
    renderShop();
    renderBuffs();
    updateMorale(false);
    updateContext();

    // ── Event handlers ──
    btnSkip.addEventListener('click', skipShop);
    btnContinue.addEventListener('click', continueGame);

    console.log('[Shop] Initialized — engine:', engineAvailable, 'morale:', morale, 'squad:', squadPlayers.length, 'items:', shopItemsData.length);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
