<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD -- Title Screen</title>
  <link rel="stylesheet" href="../game.css">
  <style>
    .game-screen { display: none; min-height: 100vh; padding: var(--space-6) var(--space-4); max-width: 1200px; margin: 0 auto; }
    .game-screen.active { display: block; }
  </style>
</head>
<body>
  <section class="game-screen active" id="screen-title" data-od-id="title-screen">
<div class="title-logo" data-od-id="title-logo">SQUAD</div>
    <div class="title-tagline" data-od-id="title-tagline">Football Card Roguelike</div>
    <div class="title-info" data-od-id="title-info">
      ⚽ Build. Form. Attack. Score. Repeat.<br>
      Draft <span>11–12 players</span> · Pick a <span>formation</span> · Trigger <span>synergies</span> · Win <span>5 matches</span>
    </div>
    <button class="btn btn-primary btn-lg" id="start-btn" data-od-id="start-campaign">Start Campaign ▸</button>
    <button class="btn btn-secondary btn-lg" id="quick-start-btn" style="margin-top:var(--space-2)" data-od-id="quick-start">⚡ Quick Start</button>
    <div class="title-help" data-od-id="title-help">
      <a href="javascript:void(0)" onclick="showTutorial()" class="help-link">How to Play</a>
    </div>
  </section>
  
  <script src="../game-engine.js"></script>
  <script src="../game-ui.js"></script>
</body>
</html>
