<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Squad Builder</title>
  <link rel="stylesheet" href="../game.css">
  <style>
    .screen { padding-top: var(--space-4); }

    /* Header */
    .builder-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
      gap: var(--space-4);
    }
    .builder-title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .squad-count {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--muted);
    }

    /* Budget section */
    .budget-section {
      margin-bottom: var(--space-6);
    }
    .budget-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--space-2);
    }
    .budget-label {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }
    .budget-amount {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      font-weight: 700;
    }

    /* Position filter tabs */
    .position-tabs {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-6);
      flex-wrap: wrap;
    }
    .position-tab {
      padding: var(--space-2) var(--space-4);
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all var(--motion-base) ease;
    }
    .position-tab:hover {
      border-color: var(--fg);
    }
    .position-tab.active {
      background: var(--accent);
      color: var(--accent-on);
      border-color: var(--accent);
    }
    .position-tab .count {
      opacity: 0.7;
      margin-left: 4px;
    }

    /* Player grid */
    .player-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-8);
    }

    /* Selected squad section */
    .selected-section {
      border-top: 3px solid var(--fg);
      padding-top: var(--space-6);
    }
    .selected-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--space-4);
    }
    .selected-title {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Selected squad grid */
    .selected-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: var(--space-3);
      margin-bottom: var(--space-6);
    }
    .selected-card {
      background: var(--surface-warm);
      border: 2px solid var(--accent);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      position: relative;
    }
    .selected-card .remove-btn {
      position: absolute;
      top: var(--space-1);
      right: var(--space-1);
      width: 20px;
      height: 20px;
      background: var(--danger);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      line-height: 1;
    }
    .selected-card .remove-btn:hover {
      background: var(--accent);
    }

    /* Empty slot */
    .empty-slot {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 80px;
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Confirm section */
    .confirm-section {
      display: flex;
      justify-content: center;
      gap: var(--space-4);
      padding: var(--space-6) 0;
    }

    /* Trait badges */
    .trait-badge {
      display: inline-block;
      padding: 1px 6px;
      background: var(--bg-dark);
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
    }

    /* Position requirement hints */
    .squad-reqs {
      display: flex;
      gap: var(--space-4);
      margin-bottom: var(--space-4);
      flex-wrap: wrap;
    }
    .req-item {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      color: var(--muted);
    }
    .req-item.met { color: var(--success); }
    .req-item.unmet { color: var(--danger); }
  </style>
</head>
<body>
  <div class="screen">
    <!-- Header -->
    <div class="builder-header">
      <div>
        <h1 class="builder-title">Squad Builder</h1>
        <p class="squad-count">Pick your squad. Budget: 360 coins.</p>
      </div>
      <div class="row gap-4">
        <a href="../index.html" class="btn btn-ghost btn-sm">← Back</a>
      </div>
    </div>

    <!-- Budget -->
    <div class="budget-section">
      <div class="budget-header">
        <span class="budget-label">Budget Used</span>
        <span class="budget-amount" id="budget-text">0 / 360</span>
      </div>
      <div class="budget-bar">
        <div class="budget-bar-fill" id="budget-fill" style="width: 0%"></div>
        <div class="budget-bar-text" id="budget-bar-label">0 / 360</div>
      </div>
    </div>

    <!-- Position filter tabs -->
    <div class="position-tabs" id="position-tabs">
      <button class="position-tab active" data-position="ALL">ALL <span class="count" id="count-all"></span></button>
      <button class="position-tab" data-position="ST">ST <span class="count" id="count-st"></span></button>
      <button class="position-tab" data-position="LW">LW <span class="count" id="count-lw"></span></button>
      <button class="position-tab" data-position="RW">RW <span class="count" id="count-rw"></span></button>
      <button class="position-tab" data-position="CM">CM <span class="count" id="count-cm"></span></button>
      <button class="position-tab" data-position="CAM">CAM <span class="count" id="count-cam"></span></button>
      <button class="position-tab" data-position="CDM">CDM <span class="count" id="count-cdm"></span></button>
      <button class="position-tab" data-position="CB">CB <span class="count" id="count-cb"></span></button>
      <button class="position-tab" data-position="FB">FB <span class="count" id="count-fb"></span></button>
      <button class="position-tab" data-position="GK">GK <span class="count" id="count-gk"></span></button>
    </div>

    <!-- Available players -->
    <div class="player-card-grid" id="player-grid"></div>

    <!-- Selected squad -->
    <div class="selected-section">
      <div class="selected-header">
        <h2 class="selected-title">Your Squad</h2>
        <span class="squad-count" id="squad-count-text">0 / 11 players</span>
      </div>

      <div class="squad-reqs">
        <span class="req-item" id="req-gk">GK: 0/1</span>
        <span class="req-item" id="req-def">DEF (CB/FB): 0/3</span>
        <span class="req-item" id="req-mid">MID (CM/CDM/CAM): 0/3</span>
        <span class="req-item" id="req-att">ATT (ST/LW/RW): 0/2</span>
        <span class="req-item" id="req-total">TOTAL: 0/10</span>
      </div>

      <div class="selected-grid" id="selected-grid"></div>

      <div class="confirm-section">
        <button class="btn btn-secondary" onclick="window.location.href='../index.html'">Cancel</button>
        <button class="btn btn-primary btn-lg" id="confirm-btn" disabled onclick="confirmSquad()">
          Confirm Squad →
        </button>
      </div>
    </div>
  </div>

  <script>
    // ─── Player Data (from game TOML) ──────────────────────────────────
    const PLAYERS = [
      // ST
      { id: "terry_henri", name: "Terry Henri", position: "ST", atk: 9, pac: 9, pas: 6, def: 1, spc: 8, traits: ["pacey","clinical"] },
      { id: "big_zlat", name: "Big Zlat", position: "ST", atk: 8, pac: 5, pas: 7, def: 2, spc: 10, traits: ["physical","technical"] },
      { id: "kun_kun", name: "Kun Kun", position: "ST", atk: 8, pac: 8, pas: 5, def: 1, spc: 7, traits: ["pacey","poacher"] },
      { id: "the_waz", name: "The Waz", position: "ST", atk: 8, pac: 6, pas: 7, def: 5, spc: 6, traits: ["physical","leader"] },
      { id: "flash_forward", name: "Theo Walk-not", position: "ST", atk: 4, pac: 7, pas: 1, def: 1, spc: 2, traits: ["pacey","poacher"] },
      { id: "lewan_goalski", name: "Lewan-goal-ski", position: "ST", atk: 9, pac: 5, pas: 2, def: 1, spc: 5, traits: ["poacher","clinical"] },

      // RW
      { id: "rob_cutter", name: "Arjen Cutback", position: "RW", atk: 8, pac: 9, pas: 6, def: 1, spc: 8, traits: ["pacey","clinical"] },
      { id: "rabona_ron", name: "El Shaa-ra-wrong", position: "RW", atk: 4, pac: 5, pas: 4, def: 1, spc: 5, traits: ["pacey","clinical"] },
      { id: "riyad_mahrizzle", name: "Riyad Mah-rizzle", position: "RW", atk: 7, pac: 7, pas: 8, def: 2, spc: 9, traits: ["technical","playmaker"] },

      // LW
      { id: "bale_out", name: "Bale Out", position: "LW", atk: 8, pac: 10, pas: 6, def: 3, spc: 7, traits: ["pacey","physical"] },
      { id: "kylian_express", name: "Dictator Kylian", position: "LW", atk: 7, pac: 10, pas: 5, def: 2, spc: 7, traits: ["pacey","clinical"] },
      { id: "cult_carl", name: "Wilfried Za-ha-ha", position: "LW", atk: 3, pac: 6, pas: 4, def: 2, spc: 3, traits: ["pacey","clinical"] },

      // CM
      { id: "maestro_xav", name: "Maestro Xav", position: "CM", atk: 3, pac: 4, pas: 10, def: 6, spc: 7, traits: ["playmaker","technical"] },
      { id: "don_andres", name: "Don Andres", position: "CM", atk: 6, pac: 7, pas: 9, def: 3, spc: 10, traits: ["technical","playmaker"] },
      { id: "captain_stevie", name: "Captain Stevie", position: "CM", atk: 8, pac: 6, pas: 8, def: 6, spc: 8, traits: ["leader","physical"] },
      { id: "jimmy_journey", name: "Park Ji-zoom", position: "CM", atk: 2, pac: 3, pas: 5, def: 4, spc: 2, traits: ["physical","leader","journeyman"] },
      { id: "yaya_too_strong", name: "Yaya Too Strong", position: "CM", atk: 4, pac: 6, pas: 5, def: 9, spc: 4, traits: ["destroyer","physical","leader"] },

      // CAM
      { id: "el_mago", name: "Juan Maestro", position: "CAM", atk: 6, pac: 5, pas: 10, def: 2, spc: 9, traits: ["technical","playmaker"] },
      { id: "mesut_assist", name: "Mesut Assist", position: "CAM", atk: 6, pac: 6, pas: 9, def: 4, spc: 7, traits: ["playmaker","technical"] },
      { id: "bruno_penandes", name: "Bruno Penandes", position: "CAM", atk: 8, pac: 5, pas: 8, def: 3, spc: 7, traits: ["playmaker","clinical"] },

      // CDM
      { id: "wall_claude", name: "N'Golo Kanteen", position: "CDM", atk: 2, pac: 4, pas: 6, def: 10, spc: 3, traits: ["destroyer","technical"] },
      { id: "frenkie_de_con", name: "Toni Cruise", position: "CDM", atk: 4, pac: 7, pas: 10, def: 7, spc: 7, traits: ["technical","playmaker"] },
      { id: "bog_bob", name: "Nigel de Wrong", position: "CDM", atk: 1, pac: 3, pas: 4, def: 6, spc: 2, traits: ["destroyer","physical"] },

      // CB
      { id: "il_capitano", name: "Van Aura", position: "CB", atk: 3, pac: 6, pas: 7, def: 10, spc: 5, traits: ["leader","technical"] },
      { id: "jt_rock", name: "JT The Rock", position: "CB", atk: 4, pac: 3, pas: 4, def: 10, spc: 4, traits: ["physical","aerial"] },
      { id: "rolls_royce", name: "The Rolls Royce", position: "CB", atk: 2, pac: 8, pas: 6, def: 9, spc: 6, traits: ["technical","leader"] },
      { id: "old_man_dan", name: "Per Merterslower", position: "CB", atk: 1, pac: 1, pas: 4, def: 7, spc: 2, traits: ["leader","aerial"] },

      // FB
      { id: "el_tren", name: "Jordi Overlap", position: "FB", atk: 5, pac: 9, pas: 7, def: 7, spc: 5, traits: ["pacey","physical"] },
      { id: "mr_reliable", name: "Lahm-burger", position: "FB", atk: 3, pac: 7, pas: 8, def: 9, spc: 4, traits: ["technical","leader"] },
      { id: "cafu_express", name: "Cafu Express", position: "FB", atk: 6, pac: 10, pas: 7, def: 6, spc: 5, traits: ["pacey","physical"] },
      { id: "the_crab", name: "Kola-sin-wreck", position: "FB", atk: 1, pac: 5, pas: 3, def: 6, spc: 1, traits: ["destroyer","leader"] },
      { id: "david_albino", name: "David Alaba-daba", position: "FB", atk: 3, pac: 8, pas: 7, def: 8, spc: 5, traits: ["technical","leader"] },

      // GK
      { id: "gigi_wall", name: "Gigi The Wall", position: "GK", atk: 1, pac: 3, pas: 5, def: 10, spc: 8, traits: ["leader","aerial"] },
      { id: "sergio_muro", name: "Thibaut Courteeth", position: "GK", atk: 1, pac: 2, pas: 3, def: 10, spc: 5, traits: ["destroyer","leader"] },
      { id: "sweaty_keeper", name: "Claudio Bra-voops", position: "GK", atk: 1, pac: 4, pas: 3, def: 6, spc: 3, traits: ["aerial"] },
      { id: "rocket_raya", name: "Rocket Raya", position: "GK", atk: 1, pac: 5, pas: 8, def: 6, spc: 8, traits: ["technical","leader"] },
    ];

    const BUDGET_MAX = 360;
    const POSITION_ORDER = ["ST","LW","RW","CM","CAM","CDM","CB","FB","GK"];
    const DEF_POSITIONS = ["CB","FB","CDM"];
    const MID_POSITIONS = ["CM","CDM","CAM"];
    const ATT_POSITIONS = ["ST","LW","RW"];

    // ─── State ──────────────────────────────────────────────────────────
    let selectedIds = new Set();
    let currentFilter = "ALL";

    // ─── Helpers ────────────────────────────────────────────────────────
    function calcCost(p) { return p.atk + p.pac + p.pas + p.def + p.spc; }

    function getSelectedCost() {
      return PLAYERS.filter(p => selectedIds.has(p.id)).reduce((s, p) => s + calcCost(p), 0);
    }

    function getAvailablePlayers() {
      return PLAYERS.filter(p => !selectedIds.has(p.id));
    }

    // ─── Render ──────────────────────────────────────────────────────────
    function renderPlayerGrid() {
      const grid = document.getElementById("player-grid");
      let players = getAvailablePlayers();
      if (currentFilter !== "ALL") {
        players = players.filter(p => p.position === currentFilter);
      }
      // Sort by position then cost desc
      players.sort((a, b) => {
        const posDiff = POSITION_ORDER.indexOf(a.position) - POSITION_ORDER.indexOf(b.position);
        if (posDiff !== 0) return posDiff;
        return calcCost(b) - calcCost(a);
      });

      grid.innerHTML = players.map(p => {
        const cost = calcCost(p);
        const affordable = getSelectedCost() + cost <= BUDGET_MAX;
        return `
          <div class="player-card ${affordable ? '' : 'card-disabled'}" onclick="togglePlayer('${p.id}')" data-od-id="player-${p.id}">
            <span class="player-cost">${cost}</span>
            <div class="player-position">${p.position}</div>
            <div class="player-name">${p.name}</div>
            <div class="stat-row"><span class="stat-label">ATK</span><div class="stat-bar"><div class="stat-bar-fill atk" style="width:${p.atk*10}%"></div></div><span class="stat-value">${p.atk}</span></div>
            <div class="stat-row"><span class="stat-label">PAC</span><div class="stat-bar"><div class="stat-bar-fill pac" style="width:${p.pac*10}%"></div></div><span class="stat-value">${p.pac}</span></div>
            <div class="stat-row"><span class="stat-label">PAS</span><div class="stat-bar"><div class="stat-bar-fill pas" style="width:${p.pas*10}%"></div></div><span class="stat-value">${p.pas}</span></div>
            <div class="stat-row"><span class="stat-label">DEF</span><div class="stat-bar"><div class="stat-bar-fill def" style="width:${p.def*10}%"></div></div><span class="stat-value">${p.def}</span></div>
            <div class="stat-row"><span class="stat-label">SPC</span><div class="stat-bar"><div class="stat-bar-fill spc" style="width:${p.spc*10}%"></div></div><span class="stat-value">${p.spc}</span></div>
            <div class="mt-2">${p.traits.map(t => `<span class="trait-badge">${t}</span>`).join(' ')}</div>
          </div>
        `;
      }).join('');
    }

    function renderSelectedGrid() {
      const grid = document.getElementById("selected-grid");
      const selected = PLAYERS.filter(p => selectedIds.has(p.id));
      selected.sort((a, b) => POSITION_ORDER.indexOf(a.position) - POSITION_ORDER.indexOf(b.position));

      let html = selected.map(p => `
        <div class="selected-card animate-scale-in" data-od-id="selected-${p.id}">
          <button class="remove-btn" onclick="event.stopPropagation(); togglePlayer('${p.id}')">✕</button>
          <div class="player-position" style="color:var(--accent)">${p.position}</div>
          <div class="player-name" style="font-size:var(--text-sm)">${p.name}</div>
          <div class="text-mono text-xs text-muted mt-2">Cost: ${calcCost(p)}</div>
        </div>
      `).join('');

      // Add empty slots
      const emptyCount = Math.max(0, 11 - selected.length);
      for (let i = 0; i < emptyCount; i++) {
        html += `<div class="empty-slot">Empty Slot</div>`;
      }

      grid.innerHTML = html;
    }

    function renderBudget() {
      const cost = getSelectedCost();
      const pct = Math.min(100, (cost / BUDGET_MAX) * 100);
      const over = cost > BUDGET_MAX;

      document.getElementById("budget-text").textContent = `${cost} / ${BUDGET_MAX}`;
      document.getElementById("budget-bar-label").textContent = `${cost} / ${BUDGET_MAX}`;
      document.getElementById("budget-fill").style.width = `${pct}%`;
      document.getElementById("budget-fill").className = `budget-bar-fill ${over ? 'over' : ''}`;
    }

    function renderCounts() {
      const available = getAvailablePlayers();
      const positions = ["ALL","ST","LW","RW","CM","CAM","CDM","CB","FB","GK"];
      const counts = {};
      positions.forEach(p => counts[p] = 0);
      available.forEach(p => { counts[p.position]++; counts["ALL"]++; });

      document.getElementById("count-all").textContent = counts["ALL"];
      document.getElementById("count-st").textContent = counts["ST"];
      document.getElementById("count-lw").textContent = counts["LW"];
      document.getElementById("count-rw").textContent = counts["RW"];
      document.getElementById("count-cm").textContent = counts["CM"];
      document.getElementById("count-cam").textContent = counts["CAM"];
      document.getElementById("count-cdm").textContent = counts["CDM"];
      document.getElementById("count-cb").textContent = counts["CB"];
      document.getElementById("count-fb").textContent = counts["FB"];
      document.getElementById("count-gk").textContent = counts["GK"];
    }

    function renderRequirements() {
      const selected = PLAYERS.filter(p => selectedIds.has(p.id));
      const gkCount = selected.filter(p => p.position === "GK").length;
      const defCount = selected.filter(p => DEF_POSITIONS.includes(p.position)).length;
      const midCount = selected.filter(p => MID_POSITIONS.includes(p.position)).length;
      const attCount = selected.filter(p => ATT_POSITIONS.includes(p.position)).length;
      const totalCount = selected.length;

      const reqGk = document.getElementById("req-gk");
      const reqDef = document.getElementById("req-def");
      const reqMid = document.getElementById("req-mid");
      const reqAtt = document.getElementById("req-att");
      const reqTotal = document.getElementById("req-total");

      reqGk.textContent = `GK: ${gkCount}/1`;
      reqGk.className = `req-item ${gkCount >= 1 ? 'met' : 'unmet'}`;

      reqDef.textContent = `DEF (CB/FB): ${defCount}/3`;
      reqDef.className = `req-item ${defCount >= 3 ? 'met' : 'unmet'}`;

      reqMid.textContent = `MID (CM/CDM/CAM): ${midCount}/3`;
      reqMid.className = `req-item ${midCount >= 3 ? 'met' : 'unmet'}`;

      reqAtt.textContent = `ATT (ST/LW/RW): ${attCount}/2`;
      reqAtt.className = `req-item ${attCount >= 2 ? 'met' : 'unmet'}`;

      reqTotal.textContent = `TOTAL: ${totalCount}/10`;
      reqTotal.className = `req-item ${totalCount >= 10 ? 'met' : totalCount > 0 ? 'unmet' : ''}`;

      // Enable/disable confirm button
      const valid = gkCount >= 1 && defCount >= 3 && midCount >= 3 && attCount >= 2 && totalCount >= 10 && totalCount <= 11 && getSelectedCost() <= BUDGET_MAX;
      document.getElementById("confirm-btn").disabled = !valid;
    }

    function renderAll() {
      renderPlayerGrid();
      renderSelectedGrid();
      renderBudget();
      renderCounts();
      renderRequirements();
      document.getElementById("squad-count-text").textContent = `${selectedIds.size} / 11 players`;
    }

    // ─── Actions ─────────────────────────────────────────────────────────
    function togglePlayer(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        if (selectedIds.size >= 11) return;
        const player = PLAYERS.find(p => p.id === id);
        if (getSelectedCost() + calcCost(player) > BUDGET_MAX) return;
        selectedIds.add(id);
      }
      renderAll();
    }

    function confirmSquad() {
      // Store selected squad in sessionStorage
      const squad = PLAYERS.filter(p => selectedIds.has(p.id));
      sessionStorage.setItem('squad', JSON.stringify(squad));
      window.location.href = 'formation-select.html';
    }

    // ─── Position tab clicks ─────────────────────────────────────────────
    document.getElementById("position-tabs").addEventListener("click", (e) => {
      const tab = e.target.closest(".position-tab");
      if (!tab) return;
      document.querySelectorAll(".position-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      currentFilter = tab.dataset.position;
      renderAll();
    });

    // ─── Init ────────────────────────────────────────────────────────────
    renderAll();
  </script>
</body>
</html>
