<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Football Card Roguelike</title>
  <link rel="stylesheet" href="game.css">
  <style>
    body {
      background: var(--bg-deep);
      color: var(--fg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(57, 255, 20, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 20, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .title-container {
      position: relative;
      z-index: 1;
      padding: var(--space-6);
    }

    /* Pixel football icon */
    .pixel-ball {
      width: 32px;
      height: 32px;
      margin: 0 auto var(--space-8);
      position: relative;
      image-rendering: pixelated;
    }
    .pixel-ball::before {
      content: '⚽';
      font-size: 28px;
      filter: grayscale(1) brightness(2);
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Logo */
    .logo-wrapper {
      margin-bottom: var(--space-8);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: clamp(48px, 14vw, 120px);
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-shadow:
        0 0 10px var(--accent-glow),
        0 0 40px var(--accent-glow),
        0 0 80px rgba(57, 255, 20, 0.15),
        4px 4px 0 rgba(0,0,0,0.6);
      line-height: 1;
      margin: 0;
      animation: neonPulse 3s ease-in-out infinite;
    }
    .tagline {
      font-family: var(--font-display);
      font-size: clamp(7px, 1.8vw, 11px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      text-shadow: 0 0 10px var(--gold-glow);
      margin-top: var(--space-4);
    }

    /* Decorative neon line */
    .title-line {
      width: 200px;
      height: 2px;
      background: var(--accent);
      margin: var(--space-8) auto;
      position: relative;
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .title-line::before,
    .title-line::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
    }
    .title-line::before { left: -10px; }
    .title-line::after { right: -10px; }

    /* Match info */
    .match-info {
      display: flex;
      gap: var(--space-10);
      justify-content: center;
      margin-bottom: var(--space-10);
      flex-wrap: wrap;
    }
    .match-info-item {
      text-align: center;
    }
    .match-info-num {
      font-family: var(--font-display);
      font-size: clamp(24px, 5vw, 40px);
      font-weight: 400;
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent-glow);
      line-height: 1;
    }
    .match-info-label {
      font-family: var(--font-display);
      font-size: 7px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-top: var(--space-2);
    }

    /* Start button */
    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-10);
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all var(--motion-base) ease;
      box-shadow: 0 0 16px var(--accent-glow), inset 0 0 16px rgba(57, 255, 20, 0.05);
      position: relative;
      overflow: hidden;
    }
    .start-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(57, 255, 20, 0.1), transparent);
      transition: left 0.5s ease;
    }
    .start-btn:hover::before {
      left: 100%;
    }
    .start-btn:hover {
      background: rgba(57, 255, 20, 0.1);
      box-shadow: 0 0 32px var(--accent-glow), 0 0 60px rgba(57, 255, 20, 0.1);
      transform: translateY(-1px);
    }
    .start-btn:active {
      transform: translateY(1px);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .start-btn .arrow {
      font-size: 1.2em;
      transition: transform var(--motion-base) ease;
    }
    .start-btn:hover .arrow {
      transform: translateX(4px);
    }

    /* Version */
    .version {
      position: fixed;
      bottom: var(--space-4);
      right: var(--space-4);
      font-family: var(--font-display);
      font-size: 7px;
      color: var(--muted);
      opacity: 0.4;
      z-index: 1;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .match-info { gap: var(--space-6); }
      .start-btn { padding: var(--space-3) var(--space-8); font-size: 10px; }
    }
  </style>
</head>
<body>
  <div class="title-container" data-od-id="title-screen">
    <div class="pixel-ball"></div>

    <div class="logo-wrapper">
      <h1 class="logo-text">SQUAD</h1>
      <p class="tagline">Football Card Roguelike</p>
    </div>

    <div class="title-line"></div>

    <div class="match-info">
      <div class="match-info-item">
        <div class="match-info-num">5</div>
        <div class="match-info-label">Matches</div>
      </div>
      <div class="match-info-item">
        <div class="match-info-num">3</div>
        <div class="match-info-label">Rounds</div>
      </div>
      <div class="match-info-item">
        <div class="match-info-num">6</div>
        <div class="match-info-label">Phases</div>
      </div>
    </div>

    <button class="start-btn" onclick="window.location.href='screens/squad-builder.html'">
      Start Campaign <span class="arrow">▸</span>
    </button>
  </div>

  <div class="version">v0.1.0</div>
</body>
</html>
