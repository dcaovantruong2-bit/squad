<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD -- Match Screen</title>
  <link rel="stylesheet" href="../game.css">
  <style>
    .game-screen { display: none; min-height: 100vh; padding: var(--space-6) var(--space-4); max-width: 1200px; margin: 0 auto; }
    .game-screen.active { display: block; }
  </style>
</head>
<body>
  <section class="game-screen active" id="screen-match" data-od-id="match-screen">
<!-- Match header -->
    <div class="match-header" data-od-id="match-header">
      <div class="match-vs">
        <div class="match-team you"><div class="match-team-name">Your XI</div></div>
        <div class="match-score"><span id="rounds-won">0</span><span class="score-dash">-</span><span id="rounds-lost">0</span></div>
        <div class="match-team"><div class="match-team-name" id="opponent-name">—</div></div>
      </div>
      <div><span style="font-family:var(--font-display);font-size:7px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em" id="match-label"></span></div>
      <div style="display:flex;gap:var(--space-4);font-family:var(--font-display);font-size:7px;color:var(--muted)">
        <div>Target: <span id="target-num" style="color:var(--gold)">500</span></div>
        <div>Score: <span id="live-score" style="color:var(--accent)">0</span></div>
      </div>
    </div>

    <!-- Progress -->
    <div class="match-progress" data-od-id="match-progress">
      <div class="progress-group">
        <div class="progress-label">Round <span id="round-num">1</span> / 3</div>
        <div class="progress-dots" id="round-dots"></div>
      </div>
      <div class="progress-group">
        <div class="progress-label">Phase <span id="phase-num">1</span> / 3</div>
        <div class="progress-dots" id="phase-dots"></div>
      </div>
    </div>

    <!-- Phase info bar -->
    <div class="phase-bar" data-od-id="phase-bar">
      <div class="phase-bar-icon" id="phase-icon">B</div>
      <div class="phase-bar-info">
        <div><span class="phase-bar-name" id="phase-name">Goal Kick</span><span class="phase-bar-weight" id="phase-weight">DEF</span></div>
        <div class="phase-bar-desc" id="phase-desc"></div>
        <div class="phase-bar-zone" id="phase-zone-label">Defensive Third</div>
      </div>
    </div>

    <!-- Live Phase Score -->
    <div class="live-score-bar" data-od-id="live-score-bar">
      <div class="live-score-info">
        <span class="live-score-label">Phase Score:</span>
        <span class="live-score-value" id="live-phase-score">0</span>
        <span class="live-score-unit">♣</span>
        <span class="live-score-detail" id="live-score-detail"></span>
      </div>
      <div class="live-synergy-badges" id="live-synergy-badges">
        <span class="live-syn-empty">Place players to trigger synergies</span>
      </div>
    </div>

    <!-- Game area — Split Panel -->
    <div class="match-panels" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-4);align-items:start;">
      <!-- LEFT: Phase slots as cards -->
      <div class="slot-panel" data-od-id="slot-panel">
        <div class="panel-title" style="margin-bottom:var(--space-2)">Phase Slots</div>
        <div id="slot-cards" style="display:flex;flex-direction:column;gap:var(--space-2)"></div>
        <div class="slot-summary" id="slot-summary" style="margin-top:var(--space-3);font-family:var(--font-body);font-size:var(--text-lg);color:var(--muted);text-align:center"></div>
      </div>
      <!-- RIGHT: Eligible players + Synergies -->
      <div style="display:flex;flex-direction:column;gap:var(--space-3)">
        <div class="sidebar-panel eligible-panel" data-od-id="eligible-panel">
          <div class="panel-title" id="eligible-title">Tap a slot to see eligible players</div>
          <div id="eligible-list" style="font-family:var(--font-body);font-size:var(--text-lg);color:var(--muted);text-align:center;padding:var(--space-4)">No slot selected</div>
        </div>
        <div class="sidebar-panel" data-od-id="synergy-panel">
          <div class="panel-title">Synergies <span style="cursor:pointer;color:var(--accent);font-family:var(--font-body);font-size:12px" onclick="toggleSynergies()" id="syn-toggle">▼ expand</span></div>
          <div class="synergy-list" id="synergy-list" style="max-height:0;overflow:hidden;transition:max-height 0.3s ease"></div>
        </div>
      </div>
    </div>

    <div class="submit-section">
      <button class="btn btn-primary btn-lg" id="submit-phase-btn">Submit Phase ▸</button>
      <button class="btn btn-secondary btn-lg" onclick="autoFillPhase()" style="margin-left:var(--space-2);background:var(--surface);color:var(--accent);border:1px solid var(--accent);padding:8px 16px;font-family:var(--font-body)">🤖 Auto-fill</button>
    </div>
  </section>
  
  <script src="../game-engine.js"></script>
  <script src="../game-ui.js"></script>
</body>
</html>
