<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD -- Campaign Complete Screen</title>
  <link rel="stylesheet" href="../game.css">
  <style>
    .game-screen { display: none; min-height: 100vh; padding: var(--space-6) var(--space-4); max-width: 1200px; margin: 0 auto; }
    .game-screen.active { display: block; }
  </style>
</head>
<body>
  <section class="game-screen active" id="screen-campaign" data-od-id="campaign-complete-screen">
<div class="result-screen">
      <div class="campaign-title" id="cc-title">Campaign Complete</div>
      <div class="match-results" id="cc-results" data-od-id="campaign-results"></div>
      <div style="display:flex;gap:var(--space-4)">
        <button class="btn btn-primary btn-lg" onclick="resetGame()">Play Again ▸</button>
      </div>
    </div>
  </section>
  
  <script src="../game-engine.js"></script>
  <script src="../game-ui.js"></script>
</body>
</html>
