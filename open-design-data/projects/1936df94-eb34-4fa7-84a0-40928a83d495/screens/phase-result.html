<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Phase Result</title>
  <link rel="stylesheet" href="../game.css">
  <script src="../game-engine.js"></script>
</head>
<body>
  <div class="screen">
<section class="game-screen" id="screen-phase-result" data-od-id="phase-result-screen">
    <div class="result-screen">
      <div class="result-verdict" id="pr-verdict">Phase Complete</div>
      <div class="result-score" id="pr-score">0</div>
      <div class="result-target" id="pr-target">Target: 500</div>

      <div class="result-breakdown" id="pr-breakdown" data-od-id="phase-breakdown">
        <div class="breakdown-title">Player Contributions</div>
        <div id="pr-breakdown-rows"></div>
      </div>

      <div class="result-synergies" id="pr-synergies" data-od-id="phase-synergies">
        <h3>Synergies Fired</h3>
        <div id="pr-synergy-list"></div>
      </div>

      <button class="btn btn-primary btn-lg" id="pr-continue-btn">Continue ▸</button>
    </div>
  </section>
  </div>
</body>
</html>
