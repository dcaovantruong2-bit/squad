<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Football Card Roguelike</title>
  <link rel="stylesheet" href="game.css">
  <style>
    body {
      background: var(--fg);
      color: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    .title-container {
      position: relative;
      z-index: 1;
      padding: var(--space-6);
    }

    /* Logo */
    .logo-wrapper {
      margin-bottom: var(--space-8);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: clamp(64px, 15vw, 140px);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-shadow:
        4px 4px 0 rgba(0,0,0,0.4),
        0 0 40px rgba(210, 75, 31, 0.3);
      line-height: 1;
      margin: 0;
    }
    .tagline {
      font-family: var(--font-mono);
      font-size: clamp(12px, 2.5vw, 18px);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--bg);
      opacity: 0.7;
      margin-top: var(--space-4);
    }

    /* Decorative line */
    .title-line {
      width: 200px;
      height: 3px;
      background: var(--accent);
      margin: var(--space-8) auto;
      position: relative;
    }
    .title-line::before,
    .title-line::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    .title-line::before { left: -12px; }
    .title-line::after { right: -12px; }

    /* Match info */
    .match-info {
      display: flex;
      gap: var(--space-8);
      justify-content: center;
      margin-bottom: var(--space-10);
      flex-wrap: wrap;
    }
    .match-info-item {
      text-align: center;
    }
    .match-info-num {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .match-info-label {
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
      margin-top: var(--space-1);
    }

    /* Start button */
    .start-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4) var(--space-10);
      background: var(--accent);
      color: var(--bg);
      border: 3px solid var(--accent);
      border-radius: var(--radius-md);
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all var(--motion-base) ease;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
      position: relative;
      overflow: hidden;
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 4px 6px 0 rgba(0,0,0,0.3);
      background: var(--accent-hover);
    }
    .start-btn:active {
      transform: translateY(2px);
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .start-btn .arrow {
      font-size: 1.2em;
      transition: transform var(--motion-base) ease;
    }
    .start-btn:hover .arrow {
      transform: translateX(4px);
    }

    /* Version */
    .version {
      position: fixed;
      bottom: var(--space-4);
      right: var(--space-4);
      font-family: var(--font-mono);
      font-size: var(--text-xs);
      opacity: 0.3;
      z-index: 1;
    }

    /* Pixel art football */
    .pixel-ball {
      width: 24px;
      height: 24px;
      background: var(--bg);
      border-radius: 50%;
      position: relative;
      margin: 0 auto var(--space-6);
      opacity: 0.4;
    }
    .pixel-ball::after {
      content: '';
      position: absolute;
      inset: 4px;
      border: 2px solid var(--fg);
      border-radius: 50%;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .match-info { gap: var(--space-6); }
      .start-btn { padding: var(--space-3) var(--space-8); font-size: var(--text-lg); }
    }
  </style>
</head>
<body>
  <div class="title-container" data-od-id="title-screen">
    <div class="pixel-ball"></div>

    <div class="logo-wrapper">
      <h1 class="logo-text">SQUAD</h1>
      <p class="tagline">Football Card Roguelike</p>
    </div>

    <div class="title-line"></div>

    <div class="match-info">
      <div class="match-info-item">
        <div class="match-info-num">5</div>
        <div class="match-info-label">Matches</div>
      </div>
      <div class="match-info-item">
        <div class="match-info-num">3</div>
        <div class="match-info-label">Rounds</div>
      </div>
      <div class="match-info-item">
        <div class="match-info-num">6</div>
        <div class="match-info-label">Phases</div>
      </div>
    </div>

    <button class="start-btn" onclick="window.location.href='screens/squad-builder.html'">
      Start Campaign <span class="arrow">→</span>
    </button>
  </div>

  <div class="version">v0.1.0</div>
</body>
</html>
