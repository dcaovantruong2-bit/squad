<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="SQUAD — Football Card Roguelike">
<title>SQUAD — Football Card Roguelike</title>
<link rel="stylesheet" href="game.css">
<link rel="stylesheet" href="game-motion.css">

<style>
/* ═══════════════════════════════════════════════════════════════════════
   SQUAD — Navigation Shell (game.html)
   SPA screen router with motion transitions
   ═══════════════════════════════════════════════════════════════════════ */

/* ─── Frame Container ─────────────────────────────────────────────── */
#game-shell {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  background: var(--bg);
}
#screen-container {
  position: relative;
  min-height: 100vh;
  padding-top: 32px; /* room for nav-bar */
}

/* ─── Screen Frames ───────────────────────────────────────────────── */
.screen-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  min-height: calc(100vh - 32px);
  margin-top: 32px;
  opacity: 0;
  pointer-events: none;
  will-change: transform, opacity;
  background: var(--bg);
  transition: none; /* animation-driven */
}
.screen-frame.active {
  opacity: 1;
  pointer-events: auto;
  position: relative;
  z-index: 2;
}
.screen-frame.active.screen-frame-gas {
  z-index: 1; /* outgoing frame stays behind after animation */
}

/* ─── Transition Animations ───────────────────────────────────────── */
/* slide-left: current exits left, new enters from right */
.slide-left-out {
  animation: slideLeftOut 300ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  z-index: 3;
}
.slide-left-in {
  animation: slideLeftIn 300ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  z-index: 4;
}
/* slide-right: current exits right, new enters from left */
.slide-right-out {
  animation: slideRightOut 300ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  z-index: 3;
}
.slide-right-in {
  animation: slideRightIn 300ms cubic-bezier(0.4, 0, 0.2, 1) forwards;
  z-index: 4;
}
/* fade: both fade */
.fade-out {
  animation: fadeOut 200ms ease-out forwards;
  z-index: 3;
}
.fade-in {
  animation: fadeIn 200ms ease-out forwards;
  z-index: 3;
}

@keyframes slideLeftOut {
  0%   { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(-100%); opacity: 0; }
}
@keyframes slideLeftIn {
  0%   { transform: translateX(100%); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}
@keyframes slideRightOut {
  0%   { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(100%); opacity: 0; }
}
@keyframes slideRightIn {
  0%   { transform: translateX(-100%); opacity: 0; }
  100% { transform: translateX(0); opacity: 1; }
}
@keyframes fadeOut {
  0%   { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes fadeIn {
  0%   { opacity: 0; }
  100% { opacity: 1; }
}

/* ─── Navigation Bar ──────────────────────────────────────────────── */
#nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 16px;
  height: 32px;
  background: var(--bg-deep);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}
#nav-bar .nav-left {
  display: flex;
  align-items: center;
  gap: 8px;
}
#nav-bar .nav-brand {
  font-family: var(--font-display);
  font-size: 10px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.12em;
  text-shadow: 0 0 6px var(--accent-glow);
  user-select: none;
}
#nav-bar .nav-sep {
  width: 1px;
  height: 16px;
  background: var(--border);
  display: inline-block;
}
#nav-bar .nav-screen-name {
  font-family: var(--font-body);
  font-size: 15px;
  color: var(--fg-dim);
  white-space: nowrap;
}
#nav-bar .nav-center {
  font-family: var(--font-display);
  font-size: 8px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
#nav-bar .nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
#nav-bar .nav-progress {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--fg-dim);
}
#nav-bar .nav-arrow {
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: color 0.15s ease;
  background: none;
  border: none;
  padding: 2px 6px;
  font-family: var(--font-body);
}
#nav-bar .nav-arrow:hover {
  color: var(--accent);
  text-shadow: 0 0 4px var(--accent-glow);
}
#nav-bar .nav-arrow:disabled {
  opacity: 0.3;
  cursor: default;
  color: var(--muted);
  text-shadow: none;
}

/* ─── Loading Spinner ─────────────────────────────────────────────── */
#loading-spinner {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 200;
}
#loading-spinner.visible {
  display: flex;
}
.spinner-content {
  text-align: center;
}
.spinner-icon {
  font-size: 32px;
  animation: spinPulse 0.8s ease-in-out infinite;
  display: block;
  margin-bottom: 12px;
}
.spinner-text {
  font-family: var(--font-display);
  font-size: 10px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  text-shadow: 0 0 8px var(--accent-glow);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes spinPulse {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.2); opacity: 1; }
}

/* ─── Dev Badge ───────────────────────────────────────────────────── */
#dev-badge {
  position: fixed;
  bottom: 8px;
  right: 8px;
  z-index: 300;
  font-family: var(--font-display);
  font-size: 7px;
  padding: 2px 6px;
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  opacity: 0.6;
  letter-spacing: 0.06em;
  pointer-events: none;
  display: none; /* hidden by default, shown in dev mode via class */
}
#dev-badge.visible {
  display: block;
}

/* ─── Toast Notifications (shell-level) ────────────────────────────── */
.shell-toast {
  position: fixed;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 250;
  font-family: var(--font-body);
  font-size: 16px;
  padding: 6px 18px;
  background: var(--danger);
  color: #fff;
  border-radius: var(--radius-sm);
  box-shadow: 0 0 20px var(--danger-glow);
  animation: toastIn 0.3s ease-out;
  pointer-events: none;
  white-space: nowrap;
}
@keyframes toastIn {
  0%   { transform: translateX(-50%) translateY(-12px); opacity: 0; }
  100% { transform: translateX(-50%) translateY(0); opacity: 1; }
}

/* ─── Screen content area (inside frame) ──────────────────────────── */
.screen-content {
  min-height: 100%;
}

/* ─── prefers-reduced-motion ──────────────────────────────────────── */
@media (prefers-reduced-motion: reduce) {
  .slide-left-out,
  .slide-left-in,
  .slide-right-out,
  .slide-right-in,
  .fade-out,
  .fade-in {
    animation-duration: 0.01ms !important;
  }
  .screen-frame {
    transition-duration: 0.01ms !important;
  }
  #loading-spinner .spinner-icon {
    animation: none;
  }
}

/* ─── Responsive nav bar ──────────────────────────────────────────── */
@media (max-width: 600px) {
  #nav-bar .nav-center { display: none; }
  #nav-bar { padding: 4px 10px; }
  #screen-container { padding-top: 28px; }
  .screen-frame { margin-top: 28px; }
}
</style>
</head>
<body>

<div id="game-shell">
  <!-- Navigation Bar -->
  <nav id="nav-bar">
    <div class="nav-left">
      <span class="nav-brand">SQUAD</span>
      <span class="nav-sep"></span>
      <span class="nav-screen-name" id="nav-screen-name">Loading…</span>
    </div>
    <div class="nav-center" id="nav-center"></div>
    <div class="nav-right">
      <span class="nav-progress" id="nav-progress"></span>
      <button class="nav-arrow" id="btn-back" title="Back (Escape)">◀</button>
      <button class="nav-arrow" id="btn-forward" title="Forward">▶</button>
    </div>
  </nav>

  <!-- Loading Spinner -->
  <div id="loading-spinner">
    <div class="spinner-content">
      <span class="spinner-icon">⚽</span>
      <div class="spinner-text">Loading…</div>
    </div>
  </div>

  <!-- Screen Container -->
  <div id="screen-container"></div>

  <!-- Dev Mode Badge -->
  <div id="dev-badge">DEV</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- Shared Game Engine                                                 -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<script src="game-motion.js"></script>
<script src="game-engine.js?v=2"></script>

<!-- ═══════════════════════════════════════════════════════════════════ -->
<!-- Navigation Shell Script                                              -->
<!-- ═══════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  /* ─── Screen Registry ────────────────────────────────────────── */
  const SCREENS = {
    'title':            { file:'screens/title-screen.html',          name:'Title' },
    'squad':            { file:'screens/squad-builder.html',          name:'Squad Builder' },
    'formation':        { file:'screens/formation-select.html',       name:'Formation' },
    'phases':           { file:'screens/phase-select.html',           name:'Phase Select' },
    'match':            { file:'screens/match-screen-fixed.html',   name:'Match' },
    'phase-result':     { file:'screens/phase-result.html',           name:'Phase Result' },
    'round-result':     { file:'screens/round-result.html',           name:'Round Result' },
    'shop':             { file:'screens/shop-screen.html',            name:'Shop' },
    'campaign-complete':{ file:'screens/campaign-complete.html',     name:'Campaign Complete' },
  };

  /* ─── Game Flow Order (for progress) ──────────────────────────── */
  const FLOW_ORDER = [
    'title', 'squad', 'formation', 'phases', 'match',
    'phase-result', 'round-result', 'shop', 'campaign-complete'
  ];

  /* ─── State ───────────────────────────────────────────────────── */
  let currentScreenId = null;
  let isTransitioning = false;
  let loadedCache = {};       // screenId -> { html, scripts, styles }
  let devMode = false;        // toggled by keyboard in dev
  let devScreensEnabled = false; // 1-9 direct nav
  let transitionHistory = []; // stack of screen IDs for back nav

  /* ─── DOM References ──────────────────────────────────────────── */
  const container = document.getElementById('screen-container');
  const spinner = document.getElementById('loading-spinner');
  const navScreenName = document.getElementById('nav-screen-name');
  const navProgress = document.getElementById('nav-progress');
  const navCenter = document.getElementById('nav-center');
  const btnBack = document.getElementById('btn-back');
  const btnForward = document.getElementById('btn-forward');
  const devBadge = document.getElementById('dev-badge');

  /* ─── Game Object ─────────────────────────────────────────────── */
  // Exposed globally so screens can call Game.navigate()
  window.Game = {
    navigate: function(screenId, opts) {
      if (!screenId || !SCREENS[screenId]) {
        console.warn('[Game] Unknown screen:', screenId);
        return;
      }
      if (isTransitioning) return;
      navigateTo(screenId, opts);
    },
    back: function() {
      if (transitionHistory.length >= 2) {
        // Go back to the previous screen
        var prev = transitionHistory[transitionHistory.length - 2];
        if (prev && SCREENS[prev]) {
          Game.transition = 'slide-right';
          navigateTo(prev, { direction:'back' });
        }
      }
    },
    transition: 'slide-left',
    _current: function() { return currentScreenId; },
    _devMode: function() { return devScreensEnabled; },
  };

  /* ─── Load Screen HTML (with caching) ─────────────────────────── */
  function loadScreen(screenId) {
    if (loadedCache[screenId]) {
      return Promise.resolve(loadedCache[screenId]);
    }

    var info = SCREENS[screenId];
    return fetch(info.file)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status + ' loading ' + info.file);
        return r.text();
      })
      .then(function(html) {
        // Parse the fetched HTML document
        var parsed = parseScreenHtml(html);
        loadedCache[screenId] = parsed;
        return parsed;
      });
  }

  /* ─── Parse Fetched HTML ─────────────────────────────────────── */
  function parseScreenHtml(html) {
    var parser = new DOMParser();
    var doc = parser.parseFromString(html, 'text/html');

    // Collect styles from head and body
    var styles = [];
    var styleEls = doc.querySelectorAll('style');
    for (var i = 0; i < styleEls.length; i++) {
      styles.push(styleEls[i].textContent);
    }

    // Collect link stylesheets (inline them as style tags)
    var linkEls = doc.querySelectorAll('link[rel="stylesheet"]');
    for (var j = 0; j < linkEls.length; j++) {
      // We'll just note these — they load from external URLs (fonts etc.)
      // The actual href will be preserved in the body content if needed
    }

    // Extract body content (everything inside <body> except <script> tags)
    var bodyContent = '';
    if (doc.body) {
      // Clone body to manipulate safely
      var bodyClone = doc.body.cloneNode(true);
      // Remove script elements from body clone
      var scriptsInBody = bodyClone.querySelectorAll('script');
      for (var k = scriptsInBody.length - 1; k >= 0; k--) {
        scriptsInBody[k].parentNode.removeChild(scriptsInBody[k]);
      }
      bodyContent = bodyClone.innerHTML;
    }

    // Collect scripts (both head and body)
    var scripts = [];
    var scriptEls = doc.querySelectorAll('script');
    for (var m = 0; m < scriptEls.length; m++) {
      var el = scriptEls[m];
      scripts.push({
        src: el.getAttribute('src') || '',
        content: el.textContent || '',
        type: el.getAttribute('type') || 'text/javascript',
      });
    }

    return { styles: styles, bodyContent: bodyContent, scripts: scripts };
  }

  /* ─── Navigate To Screen ─────────────────────────────────────── */
  function navigateTo(screenId, opts) {
    if (isTransitioning) return;
    isTransitioning = true;

    opts = opts || {};
    var transitionType = opts.transition || window.Game.transition || 'slide-left';
    var oldScreenId = currentScreenId;
    var isBack = opts.direction === 'back';

    // Update state immediately so screen handlers observing Game._current() during transition see the target.
    if (!isBack) {
      transitionHistory.push(screenId);
    }
    currentScreenId = screenId;
    updateNav(screenId);

    // Save game state before transition
    saveGameState(oldScreenId);

    // Show loading spinner (max 300ms)
    spinner.classList.add('visible');

    // Set a max timeout for the spinner
    var spinnerTimeout = setTimeout(function() {
      // If load takes too long, we still show spinner — it'll hide on completion
    }, 300);

    loadScreen(screenId)
      .then(function(screenData) {
        clearTimeout(spinnerTimeout);
        spinner.classList.remove('visible');

        // Handle outgoing frame animation
        var oldFrame = document.querySelector('.screen-frame.active');
        if (oldFrame && oldScreenId) {
          // Reset any previous animation state
          oldFrame.classList.remove('active');
          oldFrame.classList.add('screen-frame-gas'); // mark as "gas" (gone after screen)
          // Apply outgoing animation
          var outClass = transitionType + '-out';
          oldFrame.classList.add(outClass);
          // Remove old frame after animation completes
          setTimeout(function() {
            if (oldFrame.parentNode) {
              oldFrame.parentNode.removeChild(oldFrame);
            }
          }, 320);
        }

        // Create new frame
        var frame = document.createElement('div');
        frame.className = 'screen-frame';
        frame.dataset.screenId = screenId;

        // Build content: injected styles + body content
        var contentHtml = '';
        // Inject screen-specific styles
        for (var s = 0; s < screenData.styles.length; s++) {
          contentHtml += '<style>' + screenData.styles[s] + '</style>';
        }
        // Wrap body content
        contentHtml += '<div class="screen-content" id="screen-content-' + screenId + '">';
        contentHtml += screenData.bodyContent;
        contentHtml += '</div>';

        frame.innerHTML = contentHtml;
        container.appendChild(frame);

        // Execute scripts
        executeScripts(frame, screenData.scripts);

        // Activate frame with transition animation
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            frame.classList.add('active');
            var inClass = transitionType + '-in';
            frame.classList.add(inClass);

            // Clean up animation class
            setTimeout(function() {
              frame.classList.remove(inClass);
              isTransitioning = false;
            }, 320);
          });
        });

        // Update state
        if (!isBack) {
          // already pushed before async load
        }
        currentScreenId = screenId;

        // Update nav bar
        updateNav(screenId);

        // Load saved game state for this screen
        loadGameState(screenId);

        // Call screen setup if available
        callScreenSetup(screenId);

        // Update dev badge
        updateDevBadge();

        // Focus container for keyboard events
        container.focus();
      })
      .catch(function(err) {
        clearTimeout(spinnerTimeout);
        spinner.classList.remove('visible');
        isTransitioning = false;
        console.error('[Game] Failed to load screen "' + screenId + '":', err);
        showToast('Failed to load: ' + screenId);
      });
  }

  /* ─── Execute Scripts ─────────────────────────────────────────── */
  function executeScripts(frame, scripts) {
    for (var i = 0; i < scripts.length; i++) {
      var scr = scripts[i];
      // Skip external src scripts (they'd reload from network)
      if (scr.src && scr.src.trim() !== '') {
        // Create a script tag with the src
        var extScript = document.createElement('script');
        extScript.src = scr.src;
        extScript.type = scr.type || 'text/javascript';
        extScript.async = false;
        frame.appendChild(extScript);
      } else if (scr.content.trim() !== '') {
        // Inline script: eval in a fresh <script> tag
        var inlineScript = document.createElement('script');
        inlineScript.type = scr.type || 'text/javascript';
        inlineScript.textContent = scr.content;
        frame.appendChild(inlineScript);
      }
    }
  }

  /* ─── Call Screen Setup ───────────────────────────────────────── */
  function callScreenSetup(screenId) {
    // Screens can expose window.setupScreen(screenId, G) for initialization
    if (typeof window.setupScreen === 'function') {
      try {
        window.setupScreen(screenId, window.G || {});
      } catch (e) {
        console.warn('[Game] setupScreen error for', screenId, e);
      }
    }
  }

  /* ─── Update Navigation Bar ───────────────────────────────────── */
  function updateNav(screenId) {
    var info = SCREENS[screenId];
    if (!info) return;

    navScreenName.textContent = info.name;

    // Progress indicator
    var idx = FLOW_ORDER.indexOf(screenId);
    if (idx >= 0) {
      navProgress.textContent = (idx + 1) + ' / ' + FLOW_ORDER.length;
    } else {
      navProgress.textContent = '';
    }

    // Center context (optional, can be set by screens)
    navCenter.textContent = '';

    // Back/forward buttons
    btnBack.disabled = transitionHistory.length < 2;
    btnForward.disabled = true; // forward nav not tracked
  }

  /* ─── Update Dev Badge ────────────────────────────────────────── */
  function updateDevBadge() {
    devBadge.classList.toggle('visible', devScreensEnabled);
  }

  /* ─── Save / Load Game State ──────────────────────────────────── */
  function saveGameState(screenId) {
    // Persist any global game state to window.G
    if (window.G) {
      try {
        var key = 'squad_game_state';
        var state = {
          G: window.G,
          screen: screenId || currentScreenId,
          history: transitionHistory.slice(),
          timestamp: Date.now()
        };
        sessionStorage.setItem(key, JSON.stringify(state));
      } catch (e) {
        // sessionStorage may not be available
      }
    }
  }

  function loadGameState(screenId) {
    // Restore game state from sessionStorage only if no live engine state exists yet.
    try {
      if (window.G && (window.G.selectedIds && window.G.selectedIds.length)) {
        return;
      }
      var key = 'squad_game_state';
      var raw = sessionStorage.getItem(key);
      if (raw) {
        var state = JSON.parse(raw);
        if (state.G) {
          window.G = state.G;
        }
      }
    } catch (e) {
      // Ignore
    }
  }

  /* ─── Toast Notification ──────────────────────────────────────── */
  function showToast(msg) {
    var toast = document.createElement('div');
    toast.className = 'shell-toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(function() {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity 0.3s ease';
      setTimeout(function() {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 300);
    }, 2000);
  }

  /* ─── Set Center Context ──────────────────────────────────────── */
  function setNavContext(text) {
    navCenter.textContent = text;
  }
  // Expose for screens to call
  window.Game.setNavContext = setNavContext;

  /* ─── Keyboard Shortcuts ──────────────────────────────────────── */
  document.addEventListener('keydown', function(e) {
    // Dev mode toggle: Ctrl+Shift+D
    if (e.ctrlKey && e.shiftKey && e.key === 'D') {
      e.preventDefault();
      devScreensEnabled = !devScreensEnabled;
      updateDevBadge();
      showToast('Dev mode: ' + (devScreensEnabled ? 'ON' : 'OFF'));
      return;
    }

    // Escape = back
    if (e.key === 'Escape') {
      e.preventDefault();
      if (transitionHistory.length >= 2) {
        window.Game.transition = 'slide-right';
        window.Game.back();
      }
      return;
    }

    // Enter = confirm (let screens handle their own Enter)
    // But we can provide a fallback: if no active modal, go forward
    // Actually, we leave Enter to the screens entirely.

    // 1-9 = direct nav to screen (dev mode only)
    if (devScreensEnabled && e.key >= '1' && e.key <= '9') {
      e.preventDefault();
      var idx = parseInt(e.key, 10) - 1;
      var screenKeys = Object.keys(SCREENS);
      if (idx < screenKeys.length) {
        var target = screenKeys[idx];
        // Choose appropriate transition
        var flowIdx = FLOW_ORDER.indexOf(target);
        var curIdx = FLOW_ORDER.indexOf(currentScreenId);
        if (flowIdx >= 0 && curIdx >= 0) {
          window.Game.transition = flowIdx > curIdx ? 'slide-left' : 'slide-right';
        } else {
          window.Game.transition = 'slide-left';
        }
        window.Game.navigate(target);
      }
      return;
    }
  });

  /* ─── Nav Button Handlers ─────────────────────────────────────── */
  btnBack.addEventListener('click', function() {
    if (transitionHistory.length >= 2) {
      window.Game.transition = 'slide-right';
      window.Game.back();
    }
  });

  btnForward.addEventListener('click', function() {
    // Forward navigation not tracked in this simple implementation
    // Could be extended
  });

  /* ─── Preload Title Screen (initial load) ─────────────────────── */
  function init() {
    // Restore any saved session
    var restored = false;
    try {
      var raw = sessionStorage.getItem('squad_game_state');
      if (raw) {
        var state = JSON.parse(raw);
        if (state.history && state.history.length > 0) {
          transitionHistory = state.history;
        }
      }
    } catch (e) {}

    // Always start at title screen
    window.Game.transition = 'fade';
    navigateTo('title', { transition: 'fade' });
  }

  /* ─── Start ───────────────────────────────────────────────────── */
  // Wait for DOM and game-engine to be ready
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    init();
  } else {
    document.addEventListener('DOMContentLoaded', init);
  }
})();
</script>
</body>
</html>
