<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Round Result</title>
  <link rel="stylesheet" href="../game.css">
  <script src="../game-engine.js"></script>
</head>
<body>
  <div class="screen">
<section class="game-screen" id="screen-round-result" data-od-id="round-result-screen">
    <div class="result-screen">
      <div class="round-verdict" id="rr-verdict">Round Won</div>
      <div class="round-scores">
        <div class="round-score-card"><div class="round-score-label">Your Score</div><div class="round-score-value yours" id="rr-your-score">0</div></div>
        <div class="round-score-card"><div class="round-score-label">Target</div><div class="round-score-value target" id="rr-target">0</div></div>
      </div>
      <div class="match-progress-rounds" id="rr-rounds"></div>
      <div id="rr-message" style="font-family:var(--font-body);font-size:var(--text-xl);color:var(--fg-dim);margin-bottom:var(--space-6)"></div>
      <button class="btn btn-primary btn-lg" id="rr-continue-btn">Continue ▸</button>
    </div>
  </section>
  </div>
</body>
</html>
