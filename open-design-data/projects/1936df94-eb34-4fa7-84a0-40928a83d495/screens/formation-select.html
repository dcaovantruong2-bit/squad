<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Formation Select</title>
  <link rel="stylesheet" href="../game.css">
  <script src="../game-engine.js"></script>
  <style>
    .screen { padding-top: var(--space-4); }

    .form-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .form-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
      margin-bottom: var(--space-2);
    }
    .form-subtitle {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--muted);
    }

    /* Formation cards grid */
    .formations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }

    .formation-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      cursor: pointer;
      transition: all var(--motion-fast) ease;
      position: relative;
    }
    .formation-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
      transform: translateY(-2px);
    }
    .formation-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow);
      background: var(--surface-raised);
    }

    .formation-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 400;
      text-align: center;
      margin-bottom: var(--space-2);
      color: var(--fg);
    }
    .formation-desc {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--muted);
      text-align: center;
      margin-bottom: var(--space-4);
    }

    /* Pitch diagram */
    .form-pitch {
      background: var(--pitch-green);
      border: 2px solid var(--pitch-dark);
      border-radius: var(--radius-sm);
      aspect-ratio: 68 / 105;
      max-height: 200px;
      margin: 0 auto var(--space-4);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.4);
    }
    .form-pitch::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--pitch-line);
    }
    .form-pitch::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 1px solid var(--pitch-line);
      border-radius: 50%;
    }

    .form-slot {
      position: absolute;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 6px;
      font-weight: 400;
      color: var(--accent-on);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px var(--accent-glow);
    }

    /* Position bonuses */
    .bonuses {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      justify-content: center;
      margin-bottom: var(--space-3);
    }
    .bonus-tag {
      font-family: var(--font-display);
      font-size: 7px;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
    }
    .bonus-pos {
      background: rgba(57, 255, 20, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
      box-shadow: 0 0 4px var(--success-glow);
    }
    .bonus-neg {
      background: rgba(255, 51, 68, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    /* Formation meta */
    .form-meta {
      display: flex;
      justify-content: center;
      gap: var(--space-6);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--muted);
    }

    /* Confirm */
    .confirm-section {
      text-align: center;
      padding: var(--space-6) 0;
      display: flex;
      justify-content: center;
      gap: var(--space-4);
    }

    @media (max-width: 768px) {
      .formations-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="form-header">
      <h1 class="form-title">Choose Formation</h1>
      <p class="form-subtitle">Your shape determines position bonuses and trade-offs.</p>
    </div>

    <div class="formations-grid" id="formations-grid"></div>

    <div class="confirm-section">
      <button class="btn btn-secondary" onclick="window.location.href='squad-builder.html'">◂ Back</button>
      <button class="btn btn-primary btn-lg" id="confirm-btn" disabled onclick="confirmFormation()">
        Start Match ▸
      </button>
    </div>
  </div>

  <script>
    // FORMATIONS imported from game-engine.js
    // Normalize property names for formation-select compatibility
    const FORMATIONS_DISPLAY = FORMATIONS.map(f => ({
      ...f,
      hand_size: f.handSize,
      global_mult: f.globalMult,
      position_bonus: f.positionBonus,
    }));

    let selectedFormation = null;

    function renderFormations() {
      const grid = document.getElementById("formations-grid");

      grid.innerHTML = FORMATIONS_DISPLAY.map(f => {
        const bonusHtml = Object.entries(f.position_bonus).map(([pos, val]) => {
          const cls = val > 0 ? 'bonus-pos' : 'bonus-neg';
          const sign = val > 0 ? '+' : '';
          return `<span class="bonus-tag ${cls}">${pos} ${sign}${val}</span>`;
        }).join('');

        const pitchSlots = f.pitchPositions.map(p =>
          `<div class="form-slot" style="left:${p.x}%;top:${p.y}%">${p.pos}</div>`
        ).join('');

        return `
          <div class="formation-card" data-od-id="formation-${f.id}" onclick="selectFormation('${f.id}')">
            <div class="formation-name">${f.name}</div>
            <div class="formation-desc">${f.description}</div>
            <div class="form-pitch">${pitchSlots}</div>
            ${bonusHtml ? `<div class="bonuses">${bonusHtml}</div>` : '<div class="bonuses"><span class="bonus-tag bonus-pos">No bonuses</span></div>'}
            <div class="form-meta">
              <span>Hand: ${f.hand_size}</span>
              <span>Slots: ${f.slots.length}</span>
              <span>Mult: ×${f.global_mult}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectFormation(id) {
      console.log('[FORM] Selected formation:', id);
      selectedFormation = id;
      document.querySelectorAll('.formation-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-od-id="formation-${id}"]`).classList.add('selected');
      const btn = document.getElementById('confirm-btn');
      btn.disabled = false;
      btn.textContent = 'Start Match ▸';
    }

    function confirmFormation() {
      console.log('[FORM] confirmFormation called, selectedFormation:', selectedFormation);
      if (!selectedFormation) return;
      const formation = FORMATIONS.find(f => f.id === selectedFormation);
      console.log('[FORM] Navigating to match.html with formation:', formation.name);
      try { sessionStorage.setItem('formation', JSON.stringify(formation)); } catch(e) { console.warn('[FORM] sessionStorage failed:', e); }
      window.location.href = 'match.html';
    }

    renderFormations();
    console.log('[FORM] Formation select loaded. selectFormation:', typeof selectFormation);
  </script>
</body>
</html>
