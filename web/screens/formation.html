<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD -- Formation Select Screen</title>
  <link rel="stylesheet" href="../game.css">
  <style>
    .game-screen { display: none; min-height: 100vh; padding: var(--space-6) var(--space-4); max-width: 1200px; margin: 0 auto; }
    .game-screen.active { display: block; }
  </style>
</head>
<body>
  <section class="game-screen active" id="screen-formation" data-od-id="formation-select-screen">
<div class="form-header">
      <h1 class="form-title" data-od-id="formation-title">Choose Formation</h1>
      <p class="form-subtitle" data-od-id="formation-subtitle">Browse formations. Select the one that fits your squad.</p>
    </div>

    <div class="carousel-dots" id="carousel-dots"></div>

    <div class="carousel-wrap">
      <button class="carousel-arrow" id="carousel-prev" onclick="carouselPrev()" aria-label="Previous formation">◂</button>
      <div class="carousel-frame">
        <div class="carousel-card" id="carousel-card"></div>
      </div>
      <button class="carousel-arrow" id="carousel-next" onclick="carouselNext()" aria-label="Next formation">▸</button>
    </div>

    <div class="form-detail" id="form-detail"></div>

    <div class="squad-actions">
      <button class="btn" onclick="showScreen('squad')">◂ Back</button>
      <button class="btn btn-primary btn-lg" id="confirm-formation-btn" disabled>Start Match ▸</button>
    </div>
  </section>
  
  <script src="../game-engine.js"></script>
  <script src="../game-ui.js"></script>
</body>
</html>
