<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD -- Shop Screen</title>
  <link rel="stylesheet" href="../game.css">
  <style>
    .game-screen { display: none; min-height: 100vh; padding: var(--space-6) var(--space-4); max-width: 1200px; margin: 0 auto; }
    .game-screen.active { display: block; }
  </style>
</head>
<body>
  <section class="game-screen active" id="screen-shop" data-od-id="shop-screen">
<div class="result-screen" style="padding:var(--space-6);text-align:center">
      <div class="phase-title" style="color:var(--gold);font-size:var(--text-2xl);margin-bottom:var(--space-4)">💰 SHOP</div>
      <div id="shop-morale" style="font-size:var(--text-lg);color:var(--accent);margin:var(--space-4) 0"></div>
      <div id="shop-items" style="display:flex;flex-direction:column;gap:var(--space-3);max-width:400px;margin:0 auto;text-align:left"></div>
      <div style="margin-top:var(--space-6)">
        <button class="btn btn-secondary btn-lg" onclick="skipShop()">[0] Skip Shop — Continue ▸</button>
      </div>
    </div>
  </section>
  
  <script src="../game-engine.js"></script>
  <script src="../game-ui.js"></script>
</body>
</html>
