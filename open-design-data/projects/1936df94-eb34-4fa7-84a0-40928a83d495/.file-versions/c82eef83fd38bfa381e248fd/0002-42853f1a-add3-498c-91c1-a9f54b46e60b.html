<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Formation Select</title>
  <link rel="stylesheet" href="../game.css">
  <style>
    .screen { padding-top: var(--space-4); }

    .form-header {
      text-align: center;
      margin-bottom: var(--space-8);
    }
    .form-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-shadow: 0 0 10px var(--accent-glow);
      margin-bottom: var(--space-2);
    }
    .form-subtitle {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--muted);
    }

    /* Formation cards grid */
    .formations-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-6);
      margin-bottom: var(--space-8);
    }

    .formation-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      cursor: pointer;
      transition: all var(--motion-fast) ease;
      position: relative;
    }
    .formation-card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 16px var(--accent-glow);
      transform: translateY(-2px);
    }
    .formation-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow);
      background: var(--surface-raised);
    }

    .formation-name {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 400;
      text-align: center;
      margin-bottom: var(--space-2);
      color: var(--fg);
    }
    .formation-desc {
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--muted);
      text-align: center;
      margin-bottom: var(--space-4);
    }

    /* Pitch diagram */
    .form-pitch {
      background: var(--pitch-green);
      border: 2px solid var(--pitch-dark);
      border-radius: var(--radius-sm);
      aspect-ratio: 68 / 105;
      max-height: 200px;
      margin: 0 auto var(--space-4);
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.4);
    }
    .form-pitch::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--pitch-line);
    }
    .form-pitch::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      border: 1px solid var(--pitch-line);
      border-radius: 50%;
    }

    .form-slot {
      position: absolute;
      width: 22px;
      height: 22px;
      background: var(--accent);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 6px;
      font-weight: 400;
      color: var(--accent-on);
      transform: translate(-50%, -50%);
      box-shadow: 0 0 6px var(--accent-glow);
    }

    /* Position bonuses */
    .bonuses {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-2);
      justify-content: center;
      margin-bottom: var(--space-3);
    }
    .bonus-tag {
      font-family: var(--font-display);
      font-size: 7px;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
    }
    .bonus-pos {
      background: rgba(57, 255, 20, 0.1);
      color: var(--success);
      border: 1px solid var(--success);
      box-shadow: 0 0 4px var(--success-glow);
    }
    .bonus-neg {
      background: rgba(255, 51, 68, 0.1);
      color: var(--danger);
      border: 1px solid var(--danger);
    }

    /* Formation meta */
    .form-meta {
      display: flex;
      justify-content: center;
      gap: var(--space-6);
      font-family: var(--font-mono);
      font-size: var(--text-sm);
      color: var(--muted);
    }

    /* Confirm */
    .confirm-section {
      text-align: center;
      padding: var(--space-6) 0;
      display: flex;
      justify-content: center;
      gap: var(--space-4);
    }

    @media (max-width: 768px) {
      .formations-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="screen">
    <div class="form-header">
      <h1 class="form-title">Choose Formation</h1>
      <p class="form-subtitle">Your shape determines position bonuses and trade-offs.</p>
    </div>

    <div class="formations-grid" id="formations-grid"></div>

    <div class="confirm-section">
      <button class="btn btn-secondary" onclick="window.location.href='squad-builder.html'">◂ Back</button>
      <button class="btn btn-primary btn-lg" id="confirm-btn" disabled onclick="confirmFormation()">
        Start Match ▸
      </button>
    </div>
  </div>

  <script>
    const FORMATIONS = [
      {
        id: "4-4-2", name: "4-4-2",
        slots: ["CB","CB","FB","FB","CM","CM","ST","ST"],
        hand_size: 11, global_mult: 1.0,
        position_bonus: {},
        description: "Balanced. No frills. Classic.",
        pitchPositions: [
          {pos:"GK", x:50, y:92},
          {pos:"CB", x:30, y:72}, {pos:"CB", x:70, y:72},
          {pos:"FB", x:10, y:55}, {pos:"FB", x:90, y:55},
          {pos:"CM", x:30, y:40}, {pos:"CM", x:70, y:40},
          {pos:"ST", x:30, y:18}, {pos:"ST", x:70, y:18}
        ]
      },
      {
        id: "4-3-3", name: "4-3-3",
        slots: ["CB","CB","FB","FB","CDM","CM","CM","LW","RW","ST"],
        hand_size: 12, global_mult: 1.0,
        position_bonus: {"LW": 20, "RW": 20, "ST": -15, "CDM": -10},
        description: "Wingers thrive (+20). ST and CDM stretched (-15/-10).",
        pitchPositions: [
          {pos:"GK", x:50, y:92},
          {pos:"CB", x:30, y:72}, {pos:"CB", x:70, y:72},
          {pos:"FB", x:10, y:55}, {pos:"FB", x:90, y:55},
          {pos:"CDM", x:50, y:55},
          {pos:"CM", x:30, y:40}, {pos:"CM", x:70, y:40},
          {pos:"LW", x:10, y:20}, {pos:"RW", x:90, y:20},
          {pos:"ST", x:50, y:15}
        ]
      },
      {
        id: "5-3-2", name: "5-3-2",
        slots: ["CB","CB","CB","FB","FB","CM","CM","CDM","ST","ST"],
        hand_size: 11, global_mult: 1.0,
        position_bonus: {"CB": 25, "FB": 12, "LW": -20, "RW": -20},
        description: "Defence wins. CBs+25, FBs+12. Wingers don't exist (-20).",
        pitchPositions: [
          {pos:"GK", x:50, y:92},
          {pos:"CB", x:20, y:72}, {pos:"CB", x:50, y:72}, {pos:"CB", x:80, y:72},
          {pos:"FB", x:10, y:50}, {pos:"FB", x:90, y:50},
          {pos:"CDM", x:50, y:55},
          {pos:"CM", x:30, y:38}, {pos:"CM", x:70, y:38},
          {pos:"ST", x:30, y:18}, {pos:"ST", x:70, y:18}
        ]
      },
      {
        id: "3-4-3", name: "3-4-3",
        slots: ["CB","CB","FB","FB","CM","CM","LW","RW","ST","ST"],
        hand_size: 12, global_mult: 1.0,
        position_bonus: {"ST": 20, "LW": 15, "RW": 15, "CB": -25},
        description: "All-out attack. Attackers +15-20. CBs exposed (-25).",
        pitchPositions: [
          {pos:"GK", x:50, y:92},
          {pos:"CB", x:25, y:72}, {pos:"CB", x:50, y:72}, {pos:"CB", x:75, y:72},
          {pos:"FB", x:10, y:50}, {pos:"FB", x:90, y:50},
          {pos:"CM", x:35, y:40}, {pos:"CM", x:65, y:40},
          {pos:"LW", x:10, y:20}, {pos:"RW", x:90, y:20},
          {pos:"ST", x:35, y:15}, {pos:"ST", x:65, y:15}
        ]
      },
      {
        id: "4-2-3-1", name: "4-2-3-1",
        slots: ["CB","CB","FB","FB","CM","CM","CAM","LW","RW","ST"],
        hand_size: 12, global_mult: 1.0,
        position_bonus: {"CM": 10, "CAM": 25, "ST": -15},
        description: "Possession. CAM+25, CM+10. Lone ST isolated (-15).",
        pitchPositions: [
          {pos:"GK", x:50, y:92},
          {pos:"CB", x:30, y:72}, {pos:"CB", x:70, y:72},
          {pos:"FB", x:10, y:55}, {pos:"FB", x:90, y:55},
          {pos:"CM", x:35, y:50}, {pos:"CM", x:65, y:50},
          {pos:"CAM", x:50, y:35},
          {pos:"LW", x:10, y:25}, {pos:"RW", x:90, y:25},
          {pos:"ST", x:50, y:15}
        ]
      },
      {
        id: "4-5-1", name: "4-5-1",
        slots: ["CB","CB","FB","FB","CDM","CM","CM","LW","RW","ST"],
        hand_size: 12, global_mult: 1.0,
        position_bonus: {"CDM": 15, "LW": 20, "RW": 20, "ST": -20, "CB": -5},
        description: "Counter. CDM+15, wingers+20. Lone ST isolated (-20).",
        pitchPositions: [
          {pos:"GK", x:50, y:92},
          {pos:"CB", x:30, y:72}, {pos:"CB", x:70, y:72},
          {pos:"FB", x:10, y:55}, {pos:"FB", x:90, y:55},
          {pos:"CDM", x:50, y:55},
          {pos:"CM", x:30, y:40}, {pos:"CM", x:70, y:40},
          {pos:"LW", x:10, y:22}, {pos:"RW", x:90, y:22},
          {pos:"ST", x:50, y:15}
        ]
      }
    ];

    let selectedFormation = null;

    function renderFormations() {
      const grid = document.getElementById("formations-grid");

      grid.innerHTML = FORMATIONS.map(f => {
        const bonusHtml = Object.entries(f.position_bonus).map(([pos, val]) => {
          const cls = val > 0 ? 'bonus-pos' : 'bonus-neg';
          const sign = val > 0 ? '+' : '';
          return `<span class="bonus-tag ${cls}">${pos} ${sign}${val}</span>`;
        }).join('');

        const pitchSlots = f.pitchPositions.map(p =>
          `<div class="form-slot" style="left:${p.x}%;top:${p.y}%">${p.pos}</div>`
        ).join('');

        return `
          <div class="formation-card" data-od-id="formation-${f.id}" onclick="selectFormation('${f.id}')">
            <div class="formation-name">${f.name}</div>
            <div class="formation-desc">${f.description}</div>
            <div class="form-pitch">${pitchSlots}</div>
            ${bonusHtml ? `<div class="bonuses">${bonusHtml}</div>` : '<div class="bonuses"><span class="bonus-tag bonus-pos">No bonuses</span></div>'}
            <div class="form-meta">
              <span>Hand: ${f.hand_size}</span>
              <span>Slots: ${f.slots.length}</span>
              <span>Mult: ×${f.global_mult}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function selectFormation(id) {
      selectedFormation = id;
      document.querySelectorAll('.formation-card').forEach(c => c.classList.remove('selected'));
      document.querySelector(`[data-od-id="formation-${id}"]`).classList.add('selected');
      document.getElementById('confirm-btn').disabled = false;
    }

    function confirmFormation() {
      if (!selectedFormation) return;
      const formation = FORMATIONS.find(f => f.id === selectedFormation);
      sessionStorage.setItem('formation', JSON.stringify(formation));
      window.location.href = 'match.html';
    }

    renderFormations();
  </script>
</body>
</html>
