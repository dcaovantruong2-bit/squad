<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SQUAD — Phase Select</title>
  <link rel="stylesheet" href="../game.css">
  <script src="../game-engine.js"></script>
</head>
<body>
  <div class="screen">
<section class="game-screen" id="screen-phase-select" data-od-id="phase-select-screen">
    <div class="ps-header">
      <h1 class="form-title">Pick Your Phases</h1>
      <p class="form-subtitle">Dealt 6 phase cards. Pick 3 to play. Order matters for carryover!</p>
    </div>
    <div id="ps-round-info" style="font-family:var(--font-body);font-size:var(--text-lg);color:var(--fg-dim);text-align:center;margin-bottom:var(--space-4)"></div>
    <div id="ps-available-syns" style="font-family:var(--font-body);font-size:var(--text-sm);color:var(--accent);text-align:center;margin-bottom:var(--space-4)"></div>
    <div class="ps-cards" id="ps-cards"></div>
    <div class="ps-picks" id="ps-picks"></div>
    <div class="squad-actions" id="ps-actions">
      <button class="btn btn-primary btn-lg" id="confirm-phases-btn" disabled>Confirm Phase Order ▸</button>
    </div>
    <style>
      .ps-cards { display:grid; grid-template-columns: repeat(3, 1fr); gap:var(--space-3); max-width:900px; margin:0 auto; }
      .ps-card { background:var(--surface); border:2px solid var(--border); border-radius:var(--radius-md); padding:var(--space-3); cursor:pointer; transition:all var(--motion-fast) ease; position:relative; }
      .ps-card:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:0 0 12px var(--accent-glow); }
      .ps-card.selected { border-color:var(--gold); box-shadow:0 0 16px var(--gold-glow); }
      .ps-card.picked { opacity:0.5; border-color:var(--border); cursor:default; transform:none; box-shadow:none; }
      .ps-card .pc-icon { font-size:28px; margin-bottom:var(--space-2); }
      .ps-card .pc-name { font-family:var(--font-display); font-size:7px; color:var(--fg); margin-bottom:var(--space-1); text-transform:uppercase; letter-spacing:0.06em; }
      .ps-card .pc-desc { font-family:var(--font-body); font-size:var(--text-sm); color:var(--muted); margin-bottom:var(--space-2); }
      .ps-card .pc-slots { font-family:var(--font-mono); font-size:12px; color:var(--fg-dim); }
      .ps-card .pc-syn { font-family:var(--font-body); font-size:var(--text-sm); color:var(--accent); margin-top:var(--space-1); }
      .ps-card .pc-order { position:absolute; top:var(--space-2); right:var(--space-2); font-family:var(--font-display); font-size:10px; color:var(--gold); }
      .ps-picks { text-align:center; font-family:var(--font-body); font-size:var(--text-lg); color:var(--gold); margin:var(--space-4) 0; min-height:2em; }
    
    /* ─── Card Flip Animation ────────────────────────────────────── */
    .ps-card {
      perspective: 1000px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .ps-card:not(.picked):hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 0 24px var(--accent-glow);
    }
    .ps-card.selected {
      animation: card-select-pop 0.4s ease-out;
    }
    @keyframes card-select-pop {
      0% { transform: scale(1); box-shadow: 0 0 0 var(--gold-glow); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px var(--gold-glow); }
      100% { transform: scale(1); box-shadow: 0 0 16px var(--gold-glow); }
    }
    .ps-card.picked {
      animation: card-picked 0.6s ease-out;
    }
    @keyframes card-picked {
      0% { transform: scale(1) rotateY(0); opacity: 1; }
      30% { transform: scale(0.95) rotateY(90deg); opacity: 0.7; }
      60% { transform: scale(0.95) rotateY(90deg); opacity: 0.7; }
      100% { transform: scale(1) rotateY(0); opacity: 0.5; }
    }
    /* Phase card number badge */
    .pc-order {
      animation: order-pop 0.3s ease-out;
    }
    @keyframes order-pop {
      0% { transform: scale(0); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }
    /* ─── Score Cascade ──────────────────────────────────────────── */
    .result-score {
      font-variant-numeric: tabular-nums;
    }
    .score-cascading {
      animation: score-glow-pulse 0.8s ease-in-out;
    }
    @keyframes score-glow-pulse {
      0% { text-shadow: 0 0 0 var(--gold-glow); }
      50% { text-shadow: 0 0 40px var(--gold-glow), 0 0 80px rgba(255,215,0,0.2); }
      100% { text-shadow: 0 0 10px var(--gold-glow); }
    }
    /* ─── Synergy Particle Burst ─────────────────────────────────── */
    .synergy-particle {
      position: fixed;
      pointer-events: none;
      z-index: 999;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      animation: particle-fly 1s ease-out forwards;
    }
    @keyframes particle-fly {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--px), var(--py)) scale(0); }
    }
    .synergy-fired {
      animation: syn-appear 0.5s ease-out;
    }
    @keyframes syn-appear {
      0% { transform: translateX(-20px); opacity: 0; }
      60% { transform: translateX(5px); opacity: 1; }
      100% { transform: translateX(0); opacity: 1; }
    }

</style>
  </section>
  </div>
</body>
</html>
