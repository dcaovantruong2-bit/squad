# Squad — Phase-Specific Synergy Cards
# Each synergy fires when the trigger conditions are met on the current field.
# Effect types:
#   chips     → flat chips added to total chips pool
#   add_mult  → flat mult added to additive mult pool
#   x_mult    → multiplicative mult (product of all ×mult effects)
#   carryover → sets up next-phase bonus

# ── Goal Kick (GK + CB + CB) ──────────────────────────────────────────────

[[synergies]]
id = "clean_sheet"
name = "Clean Sheet"
rarity = "common"
trigger_type = "clean_sheet"
trigger = { pos_a = "GK", pos_b = "CB", stat = "def_", threshold = 20 }
effect = { chips = 15 }
description = "GK DEF + CB DEF ≥ 18: +20 chips"

[[synergies]]
id = "organised_defence"
name = "Organised Defence"
rarity = "common"
trigger_type = "organised_defence"
trigger = { positions = ["CB", "CB"], stat = "def_", threshold = 20 }
effect = { chips = 15 }
description = "CB DEF + CB DEF ≥ 18: +20 chips"

