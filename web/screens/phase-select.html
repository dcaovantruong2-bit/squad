<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Squad — Pick Your Phases</title>
<style>
:root{--bg:#161120;--bg2:#0d0a18;--surf:#231a3a;--surf2:#2e2250;--fg:#f0ecf8;--fg2:#c8b0e0;--mut:#9a8ab0;--acc:#39ff14;--acc2:#2bcc10;--gold:#ffd700;--danger:#ff3344;--info:#00ccff;--purple:#c084fc;--bord:#3d2d5c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font:18px 'VT323',monospace;min-height:100dvh}
.display{font:11px 'Press Start 2P',monospace;text-transform:uppercase;letter-spacing:.05em}
.header{text-align:center;padding:20px 16px 10px;border-bottom:2px solid var(--bord)}
.header h1{font:14px 'Press Start 2P',monospace;color:var(--acc)}
.header p{color:var(--mut);margin-top:6px}
.selection{margin-top:10px;color:var(--gold);font-size:16px}
.info{text-align:center;padding:6px;color:var(--mut);font-size:14px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:16px;max-width:700px;margin:0 auto}
.card{background:var(--surf);border:2px solid var(--bord);border-radius:8px;padding:12px;cursor:pointer;transition:all .15s;text-align:center}
.card:hover{border-color:var(--acc);box-shadow:0 0 10px rgba(57,255,20,.15)}
.card.picked{border-color:var(--gold);background:var(--surf2);opacity:.5;pointer-events:none}
.card .c-icon{font-size:28px;margin-bottom:4px}
.card .c-name{font:13px 'Press Start 2P',monospace;color:var(--acc)}
.card .c-slots{font-size:13px;color:var(--fg2);margin-top:4px}
.card .c-desc{font-size:13px;color:var(--mut);margin-top:4px}
.card .c-cat{padding:2px 8px;border-radius:3px;font:9px 'Press Start 2P',monospace;display:inline-block;margin-top:6px}

.bar{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 16px;flex-wrap:wrap;background:var(--surf);border-top:1px solid var(--bord);border-bottom:1px solid var(--bord)}
.bar .selected-phase{background:var(--surf2);border:1px solid var(--gold);border-radius:6px;padding:8px 12px;font-size:14px}
.bar .selected-phase .sp-name{color:var(--gold)}
.bar .selected-phase .sp-slots{color:var(--mut);font-size:12px}
.bar .arrow{color:var(--acc);font-size:20px}

.actions{display:flex;justify-content:center;gap:10px;padding:16px}
.actions button{padding:10px 22px;border:2px solid var(--acc);background:var(--surf);color:var(--acc);font:16px 'VT323',monospace;cursor:pointer;border-radius:6px;transition:all .15s}
.actions button:hover{background:var(--acc);color:var(--bg)}
.actions button:disabled{opacity:.35;cursor:not-allowed}
.actions button.primary{border-color:var(--gold);color:var(--gold)}
.actions button.primary:hover{background:var(--gold);color:var(--bg)}
.actions button.danger{border-color:var(--danger);color:var(--danger)}

.combo{text-align:center;padding:8px 16px;color:var(--mut);font-size:14px;min-height:24px}
.combo .bonus{color:var(--gold)}
</style>
</head>
<body>

<div class="header">
  <h1>⚽ PICK YOUR PHASES</h1>
  <p id="phaseSubtitle">Select 3 phases to play this round</p>
  <div class="selection" id="selectionCounter">0 / 3 selected</div>
</div>
<div class="info">📊 Target this round: <span id="roundTarget">350</span> pts | Formation: <span id="formationLabel">4-3-3</span></div>

<div class="grid" id="phaseGrid"></div>

<div class="bar" id="selectionBar" style="min-height:40px">
  <span style="color:var(--mut)">Selected: none</span>
</div>

<div class="combo" id="comboPreview"></div>

<div class="actions">
  <button class="danger" onclick="undoLast()" id="undoBtn" disabled>↩ UNDO</button>
  <button class="primary" onclick="confirmPhases()" id="confirmBtn" disabled>✓ CONFIRM & START MATCH</button>
</div>

<script>
// ===== GET PHASES — use dealt hand (5 of 8), not all phases =====
var phases = [];
// Prefer dealt phases from G.dealtPhases, fall back to ALL_PHASES
var phaseSource = (window.G && window.G.dealtPhases && window.G.dealtPhases.length > 0)
  ? window.G.dealtPhases
  : null;

if (phaseSource) {
  // Use dealt hand — only show the 5 phases dealt this round
  for (var i = 0; i < phaseSource.length; i++) {
    var phId = phaseSource[i];
    var ep = null;
    for (var ai = 0; ai < window.ALL_PHASES.length; ai++) {
      if (window.ALL_PHASES[ai].id === phId) { ep = window.ALL_PHASES[ai]; break; }
    }
    if (ep) {
      phases.push({
        id: ep.id,
        name: ep.name || ep.id,
        slots: (ep.slots||[]).map(function(s){return typeof s==='string'?s:s[0]}),
        icon: getIcon(ep.tag||ep.weight||'DEF'),
        category: (ep.tag||ep.weight||'DEF').toUpperCase(),
        desc: ep.desc || ep.description || '',
        weight: ep.weight || 'DEF'
      });
    }
  }
} else if (typeof window !== 'undefined' && window.ALL_PHASES) {
  // Fallback: all 8 phases (demo / first load)
  for (var i = 0; i < window.ALL_PHASES.length; i++) {
    var ep = window.ALL_PHASES[i];
    phases.push({
      id: ep.id,
      name: ep.name || ep.id,
      slots: (ep.slots||[]).map(function(s){return typeof s==='string'?s:s[0]}),
      icon: getIcon(ep.tag||ep.weight||'DEF'),
      category: (ep.tag||ep.weight||'DEF').toUpperCase(),
      desc: ep.desc || ep.description || '',
      weight: ep.weight || 'DEF'
    });
  }
}
if (phases.length === 0) {
  // Demo phases
  phases = [
    {id:'goal_kick',name:'Goal Kick',slots:['GK','CB','CB'],icon:'🛡️',category:'DEFENSIVE',desc:'Keeper launches long',weight:'DEF'},
    {id:'build_up',name:'Build-Up',slots:['FB','FB','CM'],icon:'🔄',category:'POSSESSION',desc:'Play from the back',weight:'PAS'},
    {id:'wide_attack',name:'Wide Attack',slots:['FB','LW','RW'],icon:'⚡',category:'TRANSITION',desc:'Overload the flanks',weight:'PAC'},
    {id:'direct_play',name:'Direct Play',slots:['LW','ST','CM'],icon:'🎯',category:'TRANSITION',desc:'Quick transition',weight:'ATK'},
    {id:'defensive_block',name:'Defensive Block',slots:['CB','CB','CDM'],icon:'🛡️',category:'DEFENSIVE',desc:'Compact shape',weight:'DEF'},
    {id:'tiki_taka',name:'Tiki-Taka',slots:['CM','CM','CAM'],icon:'🔄',category:'POSSESSION',desc:'Pass, move, repeat',weight:'PAS'},
    {id:'counter',name:'Counter',slots:['LW','ST','RW'],icon:'⚡',category:'TRANSITION',desc:'Explosive break',weight:'PAC'},
    {id:'set_piece',name:'Set Piece',slots:['CAM','CB','ST'],icon:'✨',category:'SPECIALIST',desc:'Dead ball specialist',weight:'SPC'}
  ];
}

function getIcon(tag) {
  var m = {DEF:'🛡️',PAS:'🔄',PAC:'⚡',ATK:'🎯',SPC:'✨',DEFENSIVE:'🛡️',POSSESSION:'🔄',TRANSITION:'⚡',ATTACKING:'⚔️',SPECIALIST:'🎯'};
  return m[(tag||'').toUpperCase()] || '🎯';
}

// ===== STATE =====
var selectedIndices = []; // up to 3

// ===== RENDER GRID =====
function renderGrid() {
  var grid = document.getElementById('phaseGrid');
  grid.innerHTML = '';

  // Update subtitle to show dealt count
  var subtitle = document.getElementById('phaseSubtitle');
  if (subtitle && phases.length < 8) {
    subtitle.textContent = 'Select 3 of ' + phases.length + ' phases — adapt to what you\'re dealt!';
  }

  for (var i = 0; i < phases.length; i++) {
    var p = phases[i];
    var card = document.createElement('div');
    card.className = 'card';
    if (selectedIndices.indexOf(i) >= 0) card.className += ' picked';
    card.innerHTML = 
      '<div class="c-icon">' + p.icon + '</div>' +
      '<div class="c-name">' + p.name + '</div>' +
      '<div class="c-slots">' + p.slots.join(' · ') + '</div>' +
      '<div class="c-desc">' + p.desc + '</div>' +
      '<span class="c-cat" style="background:var(--' + (p.weight||'def').toLowerCase() + ')22;color:var(--' + (p.weight||'def').toLowerCase() + ')">' + p.category + '</span>';
    card.onclick = function(idx) { return function() { pickPhase(idx); }; }(i);
    grid.appendChild(card);
  }
}

// ===== PICK PHASE =====
function pickPhase(idx) {
  if (selectedIndices.length >= 3) return;
  if (selectedIndices.indexOf(idx) >= 0) return;
  selectedIndices.push(idx);
  updateDisplay();
}

function undoLast() {
  if (selectedIndices.length === 0) return;
  selectedIndices.pop();
  updateDisplay();
}

function updateDisplay() {
  var bar = document.getElementById('selectionBar');
  var preview = document.getElementById('comboPreview');
  var count = selectedIndices.length;
  
  document.getElementById('selectionCounter').textContent = count + ' / 3 selected';
  document.getElementById('undoBtn').disabled = count === 0;
  document.getElementById('confirmBtn').disabled = count < 1;
  
  if (count === 0) {
    bar.innerHTML = '<span style="color:var(--mut)">Selected: none</span>';
    preview.innerHTML = '';
  } else {
    var html = '';
    for (var i = 0; i < count; i++) {
      var p = phases[selectedIndices[i]];
      html += '<div class="selected-phase"><span class="sp-name">' + p.icon + ' ' + p.name + '</span> <span class="sp-slots">' + p.slots.join('·') + '</span></div>';
      if (i < count - 1) html += '<div class="arrow">→</div>';
    }
    bar.innerHTML = html;
    
    // Combo preview
    if (count >= 2) {
      var bonus = count === 3 ? '2.0×' : '1.5×';
      preview.innerHTML = '🔗 Chain bonus: <span class="bonus">' + bonus + '</span> combo multiplier';
    } else {
      preview.innerHTML = 'Select 2+ phases for combo bonuses';
    }
  }
  
  renderGrid();
}

// ===== CONFIRM =====
function confirmPhases() {
  var pickedIds = selectedIndices.map(function(i) { return phases[i].id; });
  
  // Write to G and evaluate combo chains
  if (typeof G !== 'undefined') {
    if (typeof commitPhases === 'function') {
      commitPhases(pickedIds);
    } else {
      G.pickedPhases = pickedIds;
    }
    G.phaseIdx = 0;
    G.roundScore = 0;
    G.phaseResults = [];
    if (typeof saveGame === 'function') saveGame();
  }
  
  // Save to sessionStorage for match screen
  try {
    sessionStorage.setItem('squad_pending_phases', JSON.stringify(pickedIds));
    sessionStorage.setItem('squad_pending_formation', JSON.stringify(G ? G.formation : '4-3-3'));
    sessionStorage.setItem('squad_pending_squad', JSON.stringify(G ? G.selectedIds || [] : []));
  } catch(e) {}
  
  // Navigate
  if (window.Game) {
    Game.transition = 'slide-left';
    Game.navigate('match');
  } else {
    alert('Starting match with ' + count + ' phases!');
  }
}

// ===== INIT =====
// Show current formation/round target
if (typeof G !== 'undefined') {
  document.getElementById('formationLabel').textContent = G.formation || '4-3-3';
  if (G.matchIdx !== undefined && window.CAMPAIGN_MATCHES) {
    var cm = window.CAMPAIGN_MATCHES[G.matchIdx];
    if (cm && cm.targets && cm.targets[G.roundIdx || 0]) {
      document.getElementById('roundTarget').textContent = cm.targets[G.roundIdx||0];
    }
  }
}

renderGrid();
updateDisplay();

window.setupScreen = function(screenId) {
  if (screenId === 'phases') { renderGrid(); updateDisplay(); }
};
</script>
</body>
</html>
