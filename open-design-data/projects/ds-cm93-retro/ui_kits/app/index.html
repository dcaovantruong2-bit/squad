<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CM93 Retro Interface</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <style>
    :root {
      color-scheme: light;
      --ui-kit-bg: #ffffff;
      --ui-kit-surface: #fff;
      --ui-kit-fg: #f0f0f0;
      --ui-kit-muted: #706b65;
      --ui-kit-border: #d0d0d0;
      --ui-kit-accent: #eceb65;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--color-background, var(--ui-kit-bg));
      color: var(--color-text-1, var(--ui-kit-fg));
      font: 14px/1.5 var(--font-family, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
    }
    #root { min-height: 100vh; }
    .ui-kit-loading {
      display: grid;
      min-height: 100vh;
      place-items: center;
      color: var(--color-text-secondary, var(--ui-kit-muted));
    }
  </style>
</head>
<body>
  <div id="root"><div class="ui-kit-loading">Loading CM93 Retro UI kit...</div></div>
  <script type="text/babel" src="components/Sidebar.jsx"></script>
  <script type="text/babel" src="components/AssistantsList.jsx"></script>
  <script type="text/babel" src="components/ChatArea.jsx"></script>
  <script type="text/babel" src="components/InputBar.jsx"></script>
  <script type="text/babel" src="components/MessageBubble.jsx"></script>
  <script type="text/babel" src="components/App.jsx"></script>
  <script type="text/babel">
    const App = window.App;
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App title={"CM93 Retro"} summary={"Authentic Championship Manager 93 Amiga/PC aesthetic — extracted from actual game screenshots. Yellow title bars, blue panels, grey content areas, 1px beveled borders, flat solid colors, Amiga Topaz-style pixel font."} />);
  </script>
</body>
</html>
